<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riot Arena</title>
    <style>
        :root { --bg: #000035; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            border: 2px solid #1a1a5e;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            const W = Math.min(window.innerWidth - 20, 1200);
            const H = Math.min(window.innerHeight - 20, 750);
            canvas.width = W;
            canvas.height = H;

            const MAP_W = 1600, MAP_H = 1600;
            const GAME_DURATION = 120;
            const TEAM_COLORS = ['#e74c3c','#3498db','#2ecc71','#ffdd00'];
            const TEAM_NAMES = ['Red','Blue','Green','Yellow'];
            const NUM_TEAMS = 4, PLAYERS_PER_TEAM = 5;

            const SPAWN_ZONES = [
                { x: 40, y: 40, w: 360, h: 240 },
                { x: MAP_W - 400, y: 40, w: 360, h: 240 },
                { x: 40, y: MAP_H - 280, w: 360, h: 240 },
                { x: MAP_W - 400, y: MAP_H - 280, w: 360, h: 240 }
            ];

            const keys = {};
            let mouseX = W/2, mouseY = H/2, mouseDown = false, mouseClicked = false;
            let mouseWorldX = 0, mouseWorldY = 0;
            let keyJustPressed = {};
            let playerRallyPoint = null;

            let audioCtx = null;
            function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
            function playSound(f,d,t='square',v=0.08) { if(!audioCtx) return; try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.setValueAtTime(v,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){} }
            function sfxShoot(){ playSound(200,0.08,'square',0.06); playSound(80,0.1,'sawtooth',0.04); }
            function sfxHit(){ playSound(60,0.15,'sawtooth',0.07); }
            function sfxExplosion(){ playSound(30,0.4,'sawtooth',0.15); playSound(15,0.5,'triangle',0.12); }
            function sfxMelee(){ playSound(120,0.12,'square',0.05); playSound(40,0.08,'triangle',0.06); }
            function sfxSwitch(){ playSound(600,0.05,'sine',0.03); }
            function sfxReload(){ playSound(300,0.1,'triangle',0.04); playSound(400,0.08,'triangle',0.03); }
            function sfxWall(){ playSound(100,0.15,'triangle',0.05); playSound(150,0.1,'sine',0.04); }

            function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }
            function angleBetween(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
            function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
            function rand(min,max){ return Math.random()*(max-min)+min; }
            function randInt(min,max){ return Math.floor(rand(min,max+1)); }
            function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

            function pointToSegmentDist(px, py, ax, ay, bx, by) {
                const dx = bx - ax, dy = by - ay;
                if(dx === 0 && dy === 0) return Math.hypot(px-ax, py-ay);
                const t = clamp(((px-ax)*dx + (py-ay)*dy) / (dx*dx+dy*dy), 0, 1);
                const closestX = ax + t*dx, closestY = ay + t*dy;
                return Math.hypot(px-closestX, py-closestY);
            }

            function lineOfSightClear(x1,y1,x2,y2, buildings, walls) {
                for(const b of buildings) if(b.alive) {
                    if(b.isEnterable) { for(const w of b.walls) if(lineRectIntersection(x1,y1,x2,y2, w.x,w.y,w.w,w.h)) return false; }
                    else if(lineRectIntersection(x1,y1,x2,y2, b.x,b.y,b.w,b.h)) return false;
                }
                for(const w of walls) if(w.alive) {
                    if(pointToSegmentDist((x1+x2)/2, (y1+y2)/2, w.x1,w.y1,w.x2,w.y2) < w.thickness + 8) return false;
                }
                return true;
            }

            function rectCircleCollision(rx,ry,rw,rh,cx,cy,cr){ const cx2=clamp(cx,rx,rx+rw), cy2=clamp(cy,ry,ry+rh); return dist({x:cx2,y:cy2},{x:cx,y:cy})<cr; }
            function rectRectCollision(a,b,c,d,e,f,g,h){ return a<e+g && a+c>e && b<f+h && b+d>f; }
            function lineRectIntersection(x1,y1,x2,y2,rx,ry,rw,rh){ if(x1>=rx&&x1<=rx+rw&&y1>=ry&&y1<=ry+rh) return true; if(x2>=rx&&x2<=rx+rw&&y2>=ry&&y2<=ry+rh) return true; const edges=[[rx,ry,rx+rw,ry],[rx+rw,ry,rx+rw,ry+rh],[rx+rw,ry+rh,rx,ry+rh],[rx,ry+rh,rx,ry]]; for(const e of edges) if(segmentsIntersect(x1,y1,x2,y2,e[0],e[1],e[2],e[3])) return true; return false; }
            function segmentsIntersect(x1,y1,x2,y2,x3,y3,x4,y4){ const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4); if(Math.abs(d)<0.0001) return false; const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d; const u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d; return t>=0&&t<=1&&u>=0&&u<=1; }

            if (!ctx.roundRect) {
                ctx.roundRect = function (x, y, w, h, r) {
                    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                    this.beginPath();
                    this.moveTo(x + r.tl, y);
                    this.lineTo(x + w - r.tr, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    this.lineTo(x + w, y + h - r.br);
                    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    this.lineTo(x + r.bl, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    this.lineTo(x, y + r.tl);
                    this.quadraticCurveTo(x, y, x + r.tl, y);
                    this.closePath();
                };
            }

            let homeScreen = true;
            let gameTime = GAME_DURATION, gameOver = false, winnerTeam = -1, playerTeam = -1;
            let gameEndTime = 0;
            let players = [], buildings = [], bullets = [], particles = [], explosives = [], smokeClouds = [], walls = [];
            let disruptorProjectiles = [];
            let cars = [], destroyedCarRemains = [];
            let player = null, camera = { x:0, y:0 };
            let showRespawnScreen = false;
            let killFeed = [];

            const KILL_MESSAGES = [
                "eliminated", "destroyed", "fragged", "wiped out", "took down", "neutralized", "obliterated", "iced"
            ];
            const TEAMKILL_MESSAGES = [
                "betrayed", "team-killed", "friendly-fired", "backstabbed", "TK'd", "misfired on", "oopsied"
            ];

            const GUN_RANGE = Math.min(W/2, H/2);

            const GUN_DEFS = {
                'Sniper':{ name:'Sniper',damage:75,cooldown:1.1,range:GUN_RANGE*1.2,bulletSpeed:1300,magSize:5,reloadTime:2.8,spread:0.01,color:'#ff0000',bulletSize:4,trail:true },
                'Rifle':{ name:'Rifle',damage:38,cooldown:0.35,range:GUN_RANGE,bulletSpeed:950,magSize:20,reloadTime:1.8,spread:0.04,color:'#ff4444',bulletSize:3 },
                'SMG':{ name:'SMG',damage:14,cooldown:0.08,range:GUN_RANGE,bulletSpeed:750,magSize:30,reloadTime:1.8,spread:0.1,color:'#ffaa00',bulletSize:2 },
                'Pistol':{ name:'Pistol',damage:25,cooldown:0.35,range:GUN_RANGE,bulletSpeed:900,magSize:12,reloadTime:1.2,spread:0.03,color:'#ffd700',bulletSize:3 },
                'Shotgun':{ name:'Shotgun',damage:18,cooldown:0.7,range:GUN_RANGE*0.7,bulletSpeed:650,magSize:6,reloadTime:2.2,spread:0.25,pellets:6,color:'#ff6600',bulletSize:3 },
                'MachinePistol':{ name:'MachPistol',damage:12,cooldown:0.07,range:GUN_RANGE*0.8,bulletSpeed:700,magSize:20,reloadTime:1.5,spread:0.08,color:'#ff9900',bulletSize:2 }
            };
            const MELEE_DEFS = {
                'Bat':{ name:'Bat',damage:35,cooldown:0.5,range:65,arc:1.2 },
                'Sword':{ name:'Sword',damage:50,cooldown:0.7,range:75,arc:0.9 },
                'Knuckle':{ name:'Knuckle',damage:22,cooldown:0.25,range:45,arc:1.5 },
            };
            const EXPLOSIVE_DEFS = {
                'Grenade':{ name:'Grenade',damage:100,radius:200,fuse:1.8,quantity:5 },
                'Molotov':{ name:'Molotov',damage:35,radius:150,fuse:0.6,quantity:5,fireDuration:3,fireDPS:30 },
                'C4':{ name:'C4',damage:200,radius:250,fuse:3.0,quantity:5,sticky:true },
                'Mine':{ name:'Mine',damage:50,carDamage:200,radius:180,fuse:1.0,quantity:5,sticky:true,proximity:true },
            };

            class Car {
                constructor(x, y, id) {
                    this.id = id; this.spawnX = x; this.spawnY = y;
                    this.x = x; this.y = y; this.w = 60; this.h = 35;
                    this.angle = 0; this.speed = 0;
                    this.maxSpeed = 280; this.acceleration = 200; this.turnSpeed = 2.2;
                    this.maxHp = 80; this.hp = 80;
                    this.alive = true; this.seats = [null, null]; this.team = null;
                    this.stuckTimer = 0;
                    this.ramDamage = 100; // greatly increased damage to obstacles & walls
                }
                takeDamage(dmg) { if (!this.alive) return; this.hp -= dmg; if (this.hp <= 0) { this.hp = 0; this.destroy(); } }
                heal(amount) { if (!this.alive) return; this.hp = Math.min(this.maxHp, this.hp + amount); }
                destroy() {
                    if (!this.alive) return;
                    this.alive = false;
                    const explosionRadius = 160, explosionDamage = 50, healAmount = 30;
                    for (const p of players) {
                        if (!p.alive) continue;
                        const d = dist(this, p);
                        if (d < explosionRadius) {
                            if (p.team !== this.team) p.takeDamage(explosionDamage, null, null, 'explosion');
                            else p.hp = Math.min(p.maxHp, p.hp + healAmount);
                        }
                    }
                    for (const p of this.seats) if (p) { p.exitCar(); p.takeDamage(10, null, null, 'explosion'); }
                    destroyedCarRemains.push({x: this.x, y: this.y, angle: this.angle, timer: 5});
                    for (let i=0;i<30;i++){ const a=Math.random()*Math.PI*2; particles.push(new Particle(this.x,this.y,rand(-100,100),rand(-100,100),rand(0.4,1),'#ff4400',rand(3,6))); }
                    sfxExplosion();
                    setTimeout(() => this.reset(), 5000);
                }
                reset() {
                    this.alive = true; this.hp = this.maxHp;
                    this.x = this.spawnX; this.y = this.spawnY;
                    this.angle = 0; this.speed = 0;
                    this.team = null;
                    this.seats[0] = null; this.seats[1] = null;
                    this.stuckTimer = 0;
                }
                getAvoidanceSteer(buildings, walls) {
                    const lookAhead = 90;
                    const coneAngle = 1.3;
                    let avoidX = 0, avoidY = 0;
                    for (const b of buildings) {
                        if (!b.alive || b.isEnterable) continue;
                        const closestX = clamp(this.x, b.x, b.x+b.w);
                        const closestY = clamp(this.y, b.y, b.y+b.h);
                        const d = Math.hypot(this.x - closestX, this.y - closestY);
                        if (d < lookAhead) {
                            const angleTo = Math.atan2(closestY - this.y, closestX - this.x);
                            let diff = angleTo - this.angle;
                            while (diff > Math.PI) diff -= 2*Math.PI;
                            while (diff < -Math.PI) diff += 2*Math.PI;
                            if (Math.abs(diff) < coneAngle) {
                                const weight = (1 - d/lookAhead) * (coneAngle - Math.abs(diff)) / coneAngle;
                                avoidX += Math.cos(angleTo + Math.PI) * weight;
                                avoidY += Math.sin(angleTo + Math.PI) * weight;
                            }
                        }
                    }
                    for (const w of walls) {
                        if (!w.alive) continue;
                        const dx = w.x2 - w.x1, dy = w.y2 - w.y1;
                        const lenSq = dx*dx+dy*dy;
                        let t = 0;
                        if (lenSq > 0) t = clamp(((this.x - w.x1)*dx + (this.y - w.y1)*dy) / lenSq, 0, 1);
                        const closestX = w.x1 + t*dx, closestY = w.y1 + t*dy;
                        const d = Math.hypot(this.x - closestX, this.y - closestY);
                        if (d < lookAhead) {
                            const angleTo = Math.atan2(closestY - this.y, closestX - this.x);
                            let diff = angleTo - this.angle;
                            while (diff > Math.PI) diff -= 2*Math.PI;
                            while (diff < -Math.PI) diff += 2*Math.PI;
                            if (Math.abs(diff) < coneAngle) {
                                const weight = (1 - d/lookAhead) * (coneAngle - Math.abs(diff)) / coneAngle;
                                avoidX += Math.cos(angleTo + Math.PI) * weight;
                                avoidY += Math.sin(angleTo + Math.PI) * weight;
                            }
                        }
                    }
                    for (const b of buildings) {
                        if (!b.alive || !b.isEnterable) continue;
                        for (const bw of b.walls) {
                            const closestX = clamp(this.x, bw.x, bw.x+bw.w);
                            const closestY = clamp(this.y, bw.y, bw.y+bw.h);
                            const d = Math.hypot(this.x - closestX, this.y - closestY);
                            if (d < lookAhead) {
                                const angleTo = Math.atan2(closestY - this.y, closestX - this.x);
                                let diff = angleTo - this.angle;
                                while (diff > Math.PI) diff -= 2*Math.PI;
                                while (diff < -Math.PI) diff += 2*Math.PI;
                                if (Math.abs(diff) < coneAngle) {
                                    const weight = (1 - d/lookAhead) * (coneAngle - Math.abs(diff)) / coneAngle;
                                    avoidX += Math.cos(angleTo + Math.PI) * weight;
                                    avoidY += Math.sin(angleTo + Math.PI) * weight;
                                }
                            }
                        }
                    }
                    if (avoidX === 0 && avoidY === 0) return 0;
                    const avoidAngle = Math.atan2(avoidY, avoidX);
                    let diff = avoidAngle - this.angle;
                    while (diff > Math.PI) diff -= 2*Math.PI;
                    while (diff < -Math.PI) diff += 2*Math.PI;
                    return clamp(diff * 1.8, -0.7, 0.7);
                }

                update(dt, buildings, walls, players, allCars) {
                    if (!this.alive) return;
                    const driver = this.seats[0];
                    if (driver) {
                        let moveInput = 0, turnInput = 0;
                        if (driver.isHuman) {
                            if (keys['w'] || keys['arrowup']) moveInput += 1;
                            if (keys['s'] || keys['arrowdown']) moveInput -= 1;
                            if (keys['a'] || keys['arrowleft']) turnInput -= 1;
                            if (keys['d'] || keys['arrowright']) turnInput += 1;
                        } else {
                            if (driver.aiTarget && driver.aiState === 'combat') {
                                const targetAngle = angleBetween(this, driver.aiTarget);
                                let diff = targetAngle - this.angle;
                                while (diff > Math.PI) diff -= 2*Math.PI;
                                while (diff < -Math.PI) diff += 2*Math.PI;
                                turnInput = clamp(diff * 2, -1, 1);
                                moveInput = 1;
                            } else {
                                if (driver.aiWanderTarget) {
                                    const targetAngle = angleBetween(this, driver.aiWanderTarget);
                                    let diff = targetAngle - this.angle;
                                    while (diff > Math.PI) diff -= 2*Math.PI;
                                    while (diff < -Math.PI) diff += 2*Math.PI;
                                    turnInput = clamp(diff * 2, -1, 1);
                                    moveInput = 0.5;
                                }
                            }
                            const avoidSteer = this.getAvoidanceSteer(buildings, walls);
                            turnInput += avoidSteer;
                            turnInput = clamp(turnInput, -1, 1);
                        }
                        this.angle += turnInput * this.turnSpeed * dt;
                        this.speed += moveInput * this.acceleration * dt;
                        this.speed = clamp(this.speed, -this.maxSpeed*0.5, this.maxSpeed);
                        let newX = this.x + Math.cos(this.angle) * this.speed * dt;
                        let newY = this.y + Math.sin(this.angle) * this.speed * dt;

                        const carRect = { x: newX - this.w/2, y: newY - this.h/2, w: this.w, h: this.h };
                        let collides = false;
                        for (const b of buildings) {
                            if (!b.alive) continue;
                            if (b.isEnterable) {
                                for (const w of b.walls) {
                                    if (rectRectCollision(carRect.x, carRect.y, carRect.w, carRect.h, w.x, w.y, w.w, w.h)) {
                                        collides = true; break;
                                    }
                                }
                            } else {
                                if (rectRectCollision(carRect.x, carRect.y, carRect.w, carRect.h, b.x, b.y, b.w, b.h)) {
                                    if (b.hp >= 9999) {
                                        const angle = rand(0, Math.PI*2);
                                        const dist = rand(50, 250);
                                        this.x = MAP_W/2 + Math.cos(angle) * dist;
                                        this.y = MAP_H/2 + Math.sin(angle) * dist;
                                        this.speed = 0;
                                        return;
                                    }
                                    collides = true; break;
                                }
                            }
                            if (collides) break;
                        }
                        if (!collides) {
                            for (const w of walls) {
                                if (w.alive && pointToSegmentDist(newX, newY, w.x1, w.y1, w.x2, w.y2) < Math.max(this.w, this.h)/2 + w.thickness) {
                                    collides = true; break;
                                }
                            }
                        }

                        if (collides) {
                            const backAngle = this.angle + Math.PI;
                            const stepSize = 2;
                            let tries = 0;
                            while (collides && tries < 50) {
                                newX += Math.cos(backAngle) * stepSize;
                                newY += Math.sin(backAngle) * stepSize;
                                carRect.x = newX - this.w/2; carRect.y = newY - this.h/2;
                                collides = false;
                                for (const b of buildings) {
                                    if (!b.alive) continue;
                                    if (b.isEnterable) {
                                        for (const w of b.walls) {
                                            if (rectRectCollision(carRect.x, carRect.y, carRect.w, carRect.h, w.x, w.y, w.w, w.h)) { collides = true; break; }
                                        }
                                    } else {
                                        if (rectRectCollision(carRect.x, carRect.y, carRect.w, carRect.h, b.x, b.y, b.w, b.h)) {
                                            if (b.hp >= 9999) {
                                                const angle = rand(0, Math.PI*2);
                                                const dist = rand(50, 250);
                                                this.x = MAP_W/2 + Math.cos(angle) * dist;
                                                this.y = MAP_H/2 + Math.sin(angle) * dist;
                                                this.speed = 0; return;
                                            }
                                            collides = true; break;
                                        }
                                    }
                                    if (collides) break;
                                }
                                if (!collides) {
                                    for (const w of walls) {
                                        if (w.alive && pointToSegmentDist(newX, newY, w.x1, w.y1, w.x2, w.y2) < Math.max(this.w, this.h)/2 + w.thickness) { collides = true; break; }
                                    }
                                }
                                tries++;
                            }
                            this.speed = 0;
                        }

                        this.x = clamp(newX, this.w/2, MAP_W - this.w/2);
                        this.y = clamp(newY, this.h/2, MAP_H - this.h/2);

                        // Apply heavy ram damage to obstacles and walls
                        const carBox = { x: this.x - this.w/2, y: this.y - this.h/2, w: this.w, h: this.h };
                        for (const b of buildings) {
                            if (!b.alive || b.hp >= 9999) continue;
                            if (b.isEnterable) {
                                for (const w of b.walls) {
                                    if (rectRectCollision(carBox.x, carBox.y, carBox.w, carBox.h, w.x, w.y, w.w, w.h)) {
                                        b.takeDamage(this.ramDamage * dt, driver.id, driver.team);
                                        break;
                                    }
                                }
                            } else {
                                if (rectRectCollision(carBox.x, carBox.y, carBox.w, carBox.h, b.x, b.y, b.w, b.h)) {
                                    b.takeDamage(this.ramDamage * dt, driver.id, driver.team);
                                }
                            }
                        }
                        for (const w of walls) {
                            if (w.alive && pointToSegmentDist(this.x, this.y, w.x1, w.y1, w.x2, w.y2) < Math.max(this.w, this.h)/2 + w.thickness) {
                                w.takeDamage(this.ramDamage * dt);
                            }
                        }

                        for (const otherCar of allCars) {
                            if (otherCar === this || !otherCar.alive) continue;
                            if (rectRectCollision(this.x - this.w/2, this.y - this.h/2, this.w, this.h,
                                otherCar.x - otherCar.w/2, otherCar.y - otherCar.h/2, otherCar.w, otherCar.h)) {
                                const dx = this.x - otherCar.x;
                                const dy = this.y - otherCar.y;
                                const distCars = Math.sqrt(dx*dx+dy*dy) || 1;
                                const overlap = (this.w + otherCar.w)/2 + (this.h + otherCar.h)/4 - distCars;
                                if (overlap > 0) {
                                    const pushX = (dx / distCars) * overlap * 0.6;
                                    const pushY = (dy / distCars) * overlap * 0.6;
                                    this.x += pushX;
                                    this.y += pushY;
                                    otherCar.x -= pushX;
                                    otherCar.y -= pushY;
                                    this.speed *= 0.4;
                                    otherCar.speed *= 0.4;
                                }
                            }
                        }

                        if (!driver.isHuman && Math.abs(this.speed) < 5) {
                            this.stuckTimer += dt;
                            if (this.stuckTimer > 5) {
                                driver.exitCar();
                                this.stuckTimer = 0;
                            }
                        } else {
                            this.stuckTimer = 0;
                        }

                        for (const p of players) {
                            if (!p.alive || p.inCar) continue;
                            if (p === this.seats[0] || p === this.seats[1]) continue;
                            if (rectCircleCollision(this.x - this.w/2, this.y - this.h/2, this.w, this.h, p.x, p.y, p.radius)) {
                                const dmg = 35;
                                p.takeDamage(dmg, driver.id, driver.team, 'car');
                                const angle = angleBetween(this, p);
                                p.x += Math.cos(angle) * 4;
                                p.y += Math.sin(angle) * 4;
                                this.speed *= 0.8;
                            }

                updateAI(dt,walls,cars);

                    if(b.isPlaced){ ctx.fillStyle='rgba(74,144,226,0.8)'; ctx.fillRect(sx,sy,b.w,b.h); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(sx,sy,b.w,b.h); }
                    else if(b.isEnterable){ ctx.fillStyle='rgba(40,35,30,0.5)'; ctx.fillRect(sx,sy,b.w,b.h); for(const w of b.walls){ const wx=w.x-camera.x,wy=w.y-camera.y; ctx.fillStyle='#6b5e4e'; ctx.fillRect(wx,wy,w.w,w.h); ctx.strokeStyle='#3a3228'; ctx.lineWidth=1.5; ctx.strokeRect(wx,wy,w.w,w.h); } }
                    else { ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(sx+4,sy+4,b.w,b.h); const alpha=b.hp/b.maxHp; const r=parseInt(b.color.slice(1,3),16),g=parseInt(b.color.slice(3,5),16),bc=parseInt(b.color.slice(5,7),16); ctx.fillStyle=`rgb(${Math.floor(r*alpha+30*(1-alpha))},${Math.floor(g*alpha+20*(1-alpha))},${Math.floor(bc*alpha+15*(1-alpha))})`; ctx.fillRect(sx,sy,b.w,b.h); if(b.flashAlpha!==0){ ctx.fillStyle=`rgba(255,255,255,${Math.abs(b.flashAlpha)})`; ctx.fillRect(sx,sy,b.w,b.h); } ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2; ctx.strokeRect(sx,sy,b.w,b.h); if(b.hp<b.maxHp*0.6){ ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; for(let c=0;c<Math.floor((1-b.hp/b.maxHp)*5);c++){ ctx.beginPath(); ctx.moveTo(sx+rand(5,b.w-5),sy+rand(5,b.h-5)); ctx.lineTo(sx+rand(-20,20)+rand(5,b.w-5),sy+rand(-20,20)+rand(5,b.h-5)); ctx.stroke(); } } }
                }

                for(const w of walls) w.draw(ctx,camera);
                for(const d of disruptorProjectiles) d.draw(ctx,camera);
                for(const c of cars) if(c.alive) { c.draw(ctx,camera); if(player && player.alive && !player.inCar && dist(player,c)<60 && (c.team===null||c.team===player.team) && (c.seats[0]==null||c.seats[1]==null)) { const sx=c.x-camera.x, sy=c.y-camera.y; ctx.fillStyle='#fff'; ctx.font='bold 13px'; ctx.textAlign='center'; ctx.fillText('Press E to enter', sx, sy - c.h/2 - 6); ctx.textAlign='start'; } }
                for(const rem of destroyedCarRemains){ const sx=rem.x-camera.x,sy=rem.y-camera.y; ctx.save(); ctx.translate(sx,sy); ctx.rotate(rem.angle); ctx.fillStyle='#333'; ctx.fillRect(-30,-17,60,35); ctx.fillStyle='#aa3333'; ctx.globalAlpha=0.5; ctx.fillRect(-30,-17,60,35); ctx.globalAlpha=1; ctx.restore(); }
                for(const cloud of smokeClouds){ const sx=cloud.x-camera.x,sy=cloud.y-camera.y,a=cloud.life/cloud.maxLife; if(cloud.isSmoke) ctx.fillStyle=`rgba(180,180,180,${a*0.5})`; else ctx.fillStyle=`rgba(255,100,20,${a*0.35})`; ctx.beginPath(); ctx.arc(sx,sy,cloud.radius,0,Math.PI*2); ctx.fill(); if(!cloud.isSmoke) for(let i=0;i<8;i++){ const aa=Math.random()*Math.PI*2,rr=rand(10,cloud.radius*0.8); ctx.fillStyle=`rgba(255,${rand(80,200)},0,${a*0.7})`; ctx.beginPath(); ctx.arc(sx+Math.cos(aa)*rr,sy+Math.sin(aa)*rr,rand(3,8),0,Math.PI*2); ctx.fill(); } }
                for(const p of particles){ const sx=p.x-camera.x,sy=p.y-camera.y; ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(sx,sy,p.size,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
                for(const exp of explosives) if(!exp.dead){ const sx=exp.x-camera.x,sy=exp.y-camera.y; ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle=exp.def.name==='Molotov'?'#ff6600':'#555'; ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill(); if(exp.fuse<0.6&&Math.floor(exp.fuse*20)%2===0){ ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(sx,sy,9,0,Math.PI*2); ctx.fill(); } }
                for(const bullet of bullets){ const sx=bullet.x-camera.x,sy=bullet.y-camera.y; if(bullet.trail.length>1){ ctx.strokeStyle=bullet.color+'88'; ctx.lineWidth=bullet.size*0.7; ctx.beginPath(); ctx.moveTo(bullet.trail[0].x-camera.x,bullet.trail[0].y-camera.y); for(const t of bullet.trail) ctx.lineTo(t.x-camera.x,t.y-camera.y); ctx.lineTo(sx,sy); ctx.stroke(); } ctx.fillStyle=bullet.color; ctx.beginPath(); ctx.arc(sx,sy,bullet.size,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,bullet.size*0.4,0,Math.PI*2); ctx.fill(); }
                const sortedPlayers=[...players].filter(p=>p.alive&&!p.inCar).sort((a,b)=>a.y-b.y);
                for(const p of sortedPlayers){ const sx=p.x-camera.x,sy=p.y-camera.y; if(sx<-30||sx>W+30||sy<-30||sy>H+30) continue;
                    if(p.isShieldBot){ ctx.fillStyle=TEAM_COLORS[p.team]+'aa'; ctx.beginPath(); ctx.arc(sx,sy,p.radius+4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
                    if(p.disruptorImmune>0){
                        ctx.fillStyle=`rgba(100,180,255,${0.3+Math.sin(performance.now()*10)*0.2})`;
                        ctx.beginPath(); ctx.arc(sx,sy,p.radius+6,0,Math.PI*2); ctx.fill();
                    }
                    if(p.spawnImmunity>0){ ctx.fillStyle=`rgba(255,255,255,${0.4+Math.sin(p.spawnImmunity*15)*0.3})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+5,0,Math.PI*2); ctx.fill(); }
                    ctx.fillStyle=TEAM_COLORS[p.team]; ctx.beginPath(); ctx.arc(sx,sy,p.radius,0,Math.PI*2); ctx.fill();
                    ctx.strokeStyle=p.isHuman?'#fff':'rgba(0,0,0,0.6)'; ctx.lineWidth=p.isHuman?3:2; ctx.stroke();
                    if(p.flashAlpha>0){ ctx.fillStyle=`rgba(255,255,255,${p.flashAlpha})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius,0,Math.PI*2); ctx.fill(); }
                    if(p.explosiveLocked>0){
                        const pulse = Math.sin(performance.now() * 0.02) * 0.3 + 0.6;
                        ctx.fillStyle = `rgba(255,68,255,${pulse})`;
                        ctx.beginPath(); ctx.arc(sx, sy, p.radius+4, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#ff44ff'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('🔒', sx, sy - p.radius - 20);
                        ctx.textAlign = 'start';
                    }
                    const barrelLen=p.radius+8,bx=sx+Math.cos(p.angle)*barrelLen,by=sy+Math.sin(p.angle)*barrelLen;
                    ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(sx+Math.cos(p.angle)*(p.radius-2),sy+Math.sin(p.angle)*(p.radius-2)); ctx.lineTo(bx,by); ctx.stroke();
                    if(p.meleeActive&&p.slots[2]){ const def=p.slots[2]; ctx.strokeStyle='rgba(255,255,200,0.7)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(sx,sy,def.range,p.meleeAngle-def.arc,p.meleeAngle+def.arc); ctx.stroke(); ctx.fillStyle='rgba(255,255,200,0.25)'; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.arc(sx,sy,def.range,p.meleeAngle-def.arc,p.meleeAngle+def.arc); ctx.closePath(); ctx.fill(); }
                    const hpBarW=p.radius*2,hpBarH=4,hpBarY=sy-p.radius-10; ctx.fillStyle='#333'; ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW,hpBarH);
                    const hpPct=p.hp/p.maxHp,hpColor=hpPct>0.5?'#4f4':hpPct>0.25?'#ff0':'#f22'; ctx.fillStyle=hpColor; ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW*hpPct,hpBarH);
                    if(p.isHuman){ ctx.fillStyle='#fff'; ctx.font='bold 11px'; ctx.textAlign='center'; ctx.fillText('YOU',sx,sy-p.radius-14); ctx.textAlign='start'; }
                    if(p.isShieldBot){ ctx.fillStyle='#fff'; ctx.font='bold 10px'; ctx.fillText('SHIELD',sx,sy-p.radius-14); }
                    if(p.slotReloading[p.currentSlot]){ ctx.fillStyle='#fff'; ctx.font='10px'; ctx.fillText('⟳',sx,sy+p.radius+14); }
                    if(p.stunned>0){ ctx.fillStyle='#ff0'; ctx.font='bold 12px'; ctx.fillText('★',sx,sy-p.radius-16); }
                }
                if(player&&player.alive&&!showRespawnScreen&&player.currentSlot<=1&&!player.inCar){
                    const def=player.slots[player.currentSlot]; if(def&&def.range&&player.slotCooldown[player.currentSlot]<=0.2){ const sx=player.x-camera.x,sy=player.y-camera.y; ctx.beginPath(); ctx.arc(sx,sy,def.range,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke(); }
                }
                let kfY=25; ctx.textAlign='center'; for(const kf of killFeed){ const a=Math.min(1,kf.timer); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.font='bold 14px'; ctx.fillText(kf.text,W/2,kfY); kfY+=22; } ctx.textAlign='start';

                drawMinimap(); drawScoreboard(); drawHotbar();
                drawPlayerHealthBar();
                if(gameOver) drawGameOverScreen();
                if(showRespawnScreen) drawRespawnScreen();
                if(!gameOver&&!showRespawnScreen&&player&&player.alive){ ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(mouseX,mouseY,12,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(mouseX-16,mouseY); ctx.lineTo(mouseX-8,mouseY); ctx.moveTo(mouseX+8,mouseY); ctx.lineTo(mouseX+16,mouseY); ctx.moveTo(mouseX,mouseY-16); ctx.lineTo(mouseX,mouseY-8); ctx.moveTo(mouseX,mouseY+8); ctx.lineTo(mouseX,mouseY+16); ctx.stroke(); }
            }

            function gameLoop(ts){ let dt=(ts-lastTime)/1000; if(dt<=0) dt=0.016; lastTime=ts; update(dt); render(); requestAnimationFrame(gameLoop); }

            canvas.addEventListener('mousemove',e=>{ const rect=canvas.getBoundingClientRect(); mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top; canvas.style.cursor=(homeScreen||showRespawnScreen||gameOver)?'pointer':'crosshair'; });
            canvas.addEventListener('mousedown',e=>{
                if(e.button===0){
                    initAudio();
                    const rect = canvas.getBoundingClientRect();
                    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
                    if(homeScreen){
                        const btn = window._homeStartBtn;
                        if(btn && cx>=btn.x && cx<=btn.x+btn.w && cy>=btn.y && cy<=btn.y+btn.h){
                            homeScreen = false;
                            playerRallyPoint = null;
                            initCars(); generateMap(); initPlayers();
                            if(player){ camera.x=player.x-W/2; camera.y=player.y-H/2; }
                            lastTime=performance.now();
                            canvas.style.cursor = 'crosshair';
                        }
                        return;
                    }
                    if(gameOver){
                        const homeBtn = window._gameoverHomeBtn;
                        if(homeBtn && cx>=homeBtn.x && cx<=homeBtn.x+homeBtn.w && cy>=homeBtn.y && cy<=homeBtn.y+homeBtn.h){
                            homeScreen = true;
                            gameOver = false;
                            showRespawnScreen = false;
                            canvas.style.cursor = 'pointer';
                            return;
                        }
                        restartGame();
                        return;
                    }
                    if(showRespawnScreen && player){
                        const homeBtn = window._deathHomeBtn;
                        if(homeBtn && cx>=homeBtn.x && cx<=homeBtn.x+homeBtn.w && cy>=homeBtn.y && cy<=homeBtn.y+homeBtn.h){
                            homeScreen = true;
                            showRespawnScreen = false;
                            gameOver = false;
                            canvas.style.cursor = 'pointer';
                            return;
                        }
                        const btn = window._respawnBtn;
                        if(btn && cx>=btn.x && cx<=btn.x+btn.w && cy>=btn.y && cy<=btn.y+btn.h){
                            player.respawn();
                            showRespawnScreen=false;
                            canvas.style.cursor='crosshair';
                        }
                        return;
                    }
                    mouseDown=true; mouseClicked=true;
                }
            });
            canvas.addEventListener('mouseup',e=>{ if(e.button===0) mouseDown=false; });
            canvas.addEventListener('contextmenu',e=>{
                e.preventDefault();
                if (homeScreen || gameOver || showRespawnScreen) return;
                if (playerRallyPoint) {
                    playerRallyPoint = null;
                } else {
                    playerRallyPoint = {x: mouseWorldX, y: mouseWorldY};
                }
            });
            canvas.addEventListener('wheel', e => {
                if (homeScreen || gameOver || showRespawnScreen) return;
                if (!player || !player.alive) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? 1 : -1;
                let newSlot = player.currentSlot + delta;
                if (newSlot < 0) newSlot = 4;
                else if (newSlot > 4) newSlot = 0;
                player.switchSlot(newSlot);
            }, { passive: false });
            window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; initAudio(); if(!keyJustPressed[e.key.toLowerCase()]) keyJustPressed[e.key.toLowerCase()]=true; if(e.key==='r'||e.key==='R'){ if(gameOver){ restartGame(); return; } if(player&&player.alive&&player.currentSlot<=1&&!player.slotReloading[player.currentSlot]&&player.slotAmmo[player.currentSlot]<player.slots[player.currentSlot].magSize) player.startReload(player.currentSlot); } if(e.key>='1'&&e.key<='5'){ const slot=parseInt(e.key)-1; if(player&&player.alive&&!showRespawnScreen) player.switchSlot(slot); } });
            window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

            function init(){ lastTime=performance.now(); requestAnimationFrame(gameLoop); }
            init();
        })();
    </script>
</body>
</html>
