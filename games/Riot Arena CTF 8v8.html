<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riot Arena – Capture The Flag (8v8) Final</title>
    <style>
        :root { --bg: #000035; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; border: 2px solid #1a1a5e; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,0.6); cursor: crosshair; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const MAP_W = 1500, MAP_H = 900;
    const W = Math.min(window.innerWidth - 20, 1300);
    const H = Math.min(window.innerHeight - 20, 800);
    canvas.width = W; canvas.height = H;

    const GAME_DURATION = 180;
    const TEAM_COLORS = ['#3498db', '#e74c3c'];
    const TEAM_NAMES = ['Blue', 'Red'];
    const NUM_TEAMS = 2, PLAYERS_PER_TEAM = 8;
    const MAX_CAPTURES = 3;
    const SHIELD_RADIUS = 20;
    const SHIELD_HP = 30;
    const FLAG_RECALL_TIME = 10;
    const FLAG_SPEED_BOOST = 1.2;
    const TEAM_BOOST_DURATION = 10;

    let teamSpeedBoost = [0, 0];

    const SPAWN_ZONES = [
        { x: 40, y: 30, w: 70, h: MAP_H - 60 },
        { x: MAP_W - 110, y: 30, w: 70, h: MAP_H - 60 }
    ];

    const DEATH_VERBS = {
        bullet: ['shot', 'gunned down', 'picked off'],
        explosion: ['blown up', 'obliterated', 'detonated'],
        car: ['run over', 'rammed', 'splattered'],
        melee: ['sliced', 'bashed', 'pummeled'],
        fire: ['incinerated', 'burned', 'roasted'],
        unknown: ['eliminated', 'destroyed', 'fragged', 'wiped out', 'took down', 'neutralized', 'obliterated', 'iced']
    };
    const TEAMKILL_VERBS = {
        bullet: ['accidentally shot', 'friendly-fired on'],
        explosion: ['accidentally blew up', 'friendly-demolished'],
        car: ['accidentally ran over', 'friendly-rammed'],
        melee: ['accidentally sliced', 'friendly-bashed'],
        fire: ['accidentally burned', 'friendly-roasted'],
        unknown: ['betrayed', 'team-killed', 'friendly-fired', 'backstabbed', 'TK\'d', 'misfired on', 'oopsied']
    };
    const STREAK_NAMES = ["", "", "Double Kill", "Triple Kill", "Quadra Kill", "Penta Kill", "Mega Kill", "Ultra Kill", "Monster Kill", "Ludicrous Kill", "Godlike!"];

    const CENTER_PORTAL = {
        x: MAP_W/2,           // exactly on centre X
        y: MAP_H/2 + rand(-250, 250),   // Y varies
        radius: 25,
        cooldown: 0
    };

    function respawnCenterPortal() {
        CENTER_PORTAL.x = MAP_W/2;
        CENTER_PORTAL.y = MAP_H/2 + rand(-250, 250);
        CENTER_PORTAL.cooldown = 0;
    }

    function getTeleportTarget(player) {
        let tries = 0;
        while (tries < 20) {
            const tx = rand(50, MAP_W-50);
            const ty = rand(50, MAP_H-50);
            let safe = true;
            for (const p of players) {
                if (p.alive && p.team !== player.team && dist({x:tx, y:ty}, p) < 250) {
                    safe = false;
                    break;
                }
            }
            if (safe) return {x: tx, y: ty};
            tries++;
        }
        return {x: rand(50, MAP_W-50), y: rand(50, MAP_H-50)};
    }

    const EDGE_TELEPORT_RADIUS = 250;

    function handleCarEdgePortal(car) {
        if (car.x - car.w/2 <= 0 || car.x + car.w/2 >= MAP_W ||
            car.y - car.h/2 <= 0 || car.y + car.h/2 >= MAP_H) {
            const angle = rand(0, Math.PI * 2);
            const dist = rand(0, EDGE_TELEPORT_RADIUS);
            car.x = MAP_W/2 + Math.cos(angle) * dist;
            car.y = MAP_H/2 + Math.sin(angle) * dist;
            car.x = clamp(car.x, car.w/2, MAP_W - car.w/2);
            car.y = clamp(car.y, car.h/2, MAP_H - car.h/2);
            car.speed = rand(0, car.maxSpeed * 0.3);
            // keep angle
            sfxTeleport();
            for (let i = 0; i < 15; i++) particles.push(new Particle(car.x, car.y, rand(-50,50), rand(-50,50), 0.5, '#00ffcc', rand(3,6)));
        }
    }

    function handlePlayerEdgePortal(p) {
        if (!p.alive || p.inCar) return;
        if (p.x - p.radius <= 0 || p.x + p.radius >= MAP_W ||
            p.y - p.radius <= 0 || p.y + p.radius >= MAP_H) {
            const angle = rand(0, Math.PI * 2);
            const dist = rand(0, EDGE_TELEPORT_RADIUS);
            p.x = MAP_W/2 + Math.cos(angle) * dist;
            p.y = MAP_H/2 + Math.sin(angle) * dist;
            p.x = clamp(p.x, p.radius, MAP_W - p.radius);
            p.y = clamp(p.y, p.radius, MAP_H - p.radius);
            p.vx *= 0.3; p.vy *= 0.3;
            sfxTeleport();
            for (let i = 0; i < 12; i++) particles.push(new Particle(p.x, p.y, rand(-40,40), rand(-40,40), 0.4, '#00ffcc', rand(2,4)));
        }
    }

    class Flag {
        constructor(team) {
            this.team = team;
            this.homeX = team === 0 ? 100 : MAP_W - 100;
            this.homeY = MAP_H / 2;
            this.x = this.homeX;
            this.y = this.homeY;
            this.carrier = null;
            this.dropped = false;
            this.droppedTimer = 0;
            this.waveOffset = 0;
            this.recallTimer = 0;
        }
        drop(x, y) {
            if (this.carrier) {
                this.carrier.slots[2] = this.carrier.previousMelee || MELEE_DEFS[choice(Object.keys(MELEE_DEFS).filter(k => k !== 'Flag'))];
                this.carrier.previousMelee = null;
            }
            this.x = x; this.y = y; this.carrier = null; this.dropped = true; this.droppedTimer = 30; this.recallTimer = 0;
        }
        pickUp(player) {
            if (player.isShieldBot) return;
            player.previousMelee = player.slots[2];
            this.carrier = player;
            this.dropped = false;
            this.recallTimer = 0;
            player.hasEnemyFlag = true;
            player.currentSlot = 2;
            player.meleeActive = false;
            player.shields = [
                { hp: SHIELD_HP, angle: 0 },
                { hp: SHIELD_HP, angle: Math.PI*2/3 },
                { hp: SHIELD_HP, angle: Math.PI*4/3 }
            ];
        }
        returnToBase() { this.x = this.homeX; this.y = this.homeY; this.carrier = null; this.dropped = false; this.recallTimer = 0; }
        update(dt) {
            this.waveOffset += dt * 3;
            if (this.carrier) { this.x = this.carrier.x; this.y = this.carrier.y - 16; }
            if (this.dropped) {
                this.droppedTimer -= dt;
                if (this.droppedTimer <= 0) this.returnToBase();
                let recallingPlayer = null;
                for (const p of players) {
                    if (p.alive && p.team === this.team && !p.hasEnemyFlag && dist(p, this) < 40) {
                        recallingPlayer = p;
                        break;
                    }
                }
                if (recallingPlayer) {
                    this.recallTimer += dt;
                    if (this.recallTimer >= FLAG_RECALL_TIME) {
                        this.returnToBase();
                    }
                } else {
                    this.recallTimer = 0;
                }
            }
        }
        draw(ctx, cam) {
            const sx = this.x - cam.x, sy = this.y - cam.y;
            const color = TEAM_COLORS[this.team];
            const poleH = 38, bannerW = 20, bannerH = 15;
            if (!this.carrier) {
                const alpha = 0.2 + Math.sin(this.waveOffset) * 0.1;
                const grd = ctx.createRadialGradient(sx, sy - poleH/2, 4, sx, sy - poleH/2, 42);
                grd.addColorStop(0, `rgba(255,255,200,${alpha+0.25})`);
                grd.addColorStop(1, 'rgba(255,200,50,0)');
                ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(sx, sy - poleH/2, 42, 0, Math.PI*2); ctx.fill();
            }
            ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - poleH); ctx.stroke();
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(sx, sy - poleH, 4, 0, Math.PI*2); ctx.fill();
            const waveShift = Math.sin(this.waveOffset) * 2;
            ctx.fillStyle = color; ctx.fillRect(sx + 2, sy - poleH + 4 + waveShift, bannerW, bannerH);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.strokeRect(sx + 2, sy - poleH + 4 + waveShift, bannerW, bannerH);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(this.team === 0 ? 'B' : 'R', sx + bannerW/2 + 2, sy - poleH + bannerH/2 + 4 + waveShift);
            ctx.textAlign = 'start';
            if (this.carrier) {
                ctx.fillStyle = color; ctx.fillRect(sx - 6, sy - 10, 12, 10);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 8px'; ctx.fillText(this.team === 0 ? 'B' : 'R', sx-2, sy-2);
            }
        }
    }

    const flags = [new Flag(0), new Flag(1)];
    let captures = [0, 0];

    function hexToRgb(hex) { const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:255,g:255,b:255}; }
    const keys = {};
    let mouseX = W/2, mouseY = H/2, mouseDown = false, mouseClicked = false;
    let mouseWorldX = 0, mouseWorldY = 0;
    let keyJustPressed = {};
    let playerRallyPoint = null;
    let teamRallyPoints = [null, null];

    let audioCtx = null;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    function playSound(f,d,t='square',v=0.08) { if(!audioCtx) return; try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.setValueAtTime(v,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){} }
    function sfxShoot(){ playSound(200,0.08,'square',0.06); playSound(80,0.1,'sawtooth',0.04); }
    function sfxHit(){ playSound(60,0.15,'sawtooth',0.07); }
    function sfxExplosion(){ playSound(30,0.4,'sawtooth',0.15); playSound(15,0.5,'triangle',0.12); }
    function sfxMelee(){ playSound(120,0.12,'square',0.05); playSound(40,0.08,'triangle',0.06); }
    function sfxSwitch(){ playSound(600,0.05,'sine',0.03); }
    function sfxReload(){ playSound(300,0.1,'triangle',0.04); playSound(400,0.08,'triangle',0.03); }
    function sfxFlagPickup(){ playSound(400,0.2,'sine',0.1); playSound(600,0.15,'triangle',0.08); }
    function sfxFlagScore(){ playSound(800,0.3,'square',0.15); playSound(1000,0.2,'triangle',0.1); }
    function sfxTeleport(){ playSound(500,0.3,'sine',0.1); playSound(700,0.2,'triangle',0.08); }
    function sfxShieldHit(){ playSound(200,0.15,'triangle',0.06); }

    function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }
    function angleBetween(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
    function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
    function rand(min,max){ return Math.random()*(max-min)+min; }
    function randInt(min,max){ return Math.floor(rand(min,max+1)); }
    function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    function pointToSegmentDist(px, py, ax, ay, bx, by) { const dx = bx - ax, dy = by - ay; if(dx === 0 && dy === 0) return Math.hypot(px-ax, py-ay); const t = clamp(((px-ax)*dx + (py-ay)*dy) / (dx*dx+dy*dy), 0, 1); return Math.hypot(px-(ax+t*dx), py-(ay+t*dy)); }
    function lineOfSightClear(x1,y1,x2,y2, buildings, walls) { for(const b of buildings) if(b.alive) { if(b.isEnterable) { for(const w of b.walls) if(lineRectIntersection(x1,y1,x2,y2, w.x,w.y,w.w,w.h)) return false; } else if(lineRectIntersection(x1,y1,x2,y2, b.x,b.y,b.w,b.h)) return false; } for(const w of walls) if(w.alive) { if(pointToSegmentDist((x1+x2)/2, (y1+y2)/2, w.x1,w.y1,w.x2,w.y2) < w.thickness + 8) return false; } return true; }
    function rectCircleCollision(rx,ry,rw,rh,cx,cy,cr){ const cx2=clamp(cx,rx,rx+rw), cy2=clamp(cy,ry,ry+rh); return dist({x:cx2,y:cy2},{x:cx,y:cy})<cr; }
    function rectRectCollision(a,b,c,d,e,f,g,h){ return a<e+g && a+c>e && b<f+h && b+d>f; }
    function lineRectIntersection(x1,y1,x2,y2,rx,ry,rw,rh){ if(x1>=rx&&x1<=rx+rw&&y1>=ry&&y1<=ry+rh) return true; if(x2>=rx&&x2<=rx+rw&&y2>=ry&&y2<=ry+rh) return true; const edges=[[rx,ry,rx+rw,ry],[rx+rw,ry,rx+rw,ry+rh],[rx+rw,ry+rh,rx,ry+rh],[rx,ry+rh,rx,ry]]; for(const e of edges) if(segmentsIntersect(x1,y1,x2,y2,e[0],e[1],e[2],e[3])) return true; return false; }
    function segmentsIntersect(x1,y1,x2,y2,x3,y3,x4,y4){ const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4); if(Math.abs(d)<0.0001) return false; const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d, u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d; return t>=0&&t<=1&&u>=0&&u<=1; }

    if (!ctx.roundRect) { ctx.roundRect = function (x, y, w, h, r) { if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r}; this.beginPath(); this.moveTo(x + r.tl, y); this.lineTo(x + w - r.tr, y); this.quadraticCurveTo(x + w, y, x + w, y + r.tr); this.lineTo(x + w, y + h - r.br); this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h); this.lineTo(x + r.bl, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r.bl); this.lineTo(x, y + r.tl); this.quadraticCurveTo(x, y, x + r.tl, y); this.closePath(); }; }

    let homeScreen = true;
    let gameTime = GAME_DURATION, gameOver = false, winnerTeam = -1, playerTeam = -1;
    let gameEndTime = 0;
    let players = [], buildings = [], bullets = [], particles = [], explosives = [], smokeClouds = [], walls = [];
    let disruptorProjectiles = [];
    let cars = [], destroyedCarRemains = [];
    let player = null, camera = { x:0, y:0 };
    let showRespawnScreen = false;
    let killFeed = [];

    const CAR_RAM_DAMAGE_BUILDING = 40;
    const CAR_RAM_DAMAGE_WALL = 30;

    // ---------- CLASSES ----------
    class Car {
        constructor(x, y, id, angle = 0) { this.id=id; this.spawnX=x; this.spawnY=y; this.x=x; this.y=y; this.w=60; this.h=35; this.angle=angle; this.speed=0; this.maxSpeed=200; this.acceleration=150; this.turnSpeed=2.2; this.maxHp=80; this.hp=80; this.alive=true; this.seats=[null,null]; this.team=null; this.stuckTimer=0; this.lastPosX=x; this.lastPosY=y; this.trueStuckTimer=0; }
        takeDamage(dmg) { if(!this.alive) return; this.hp-=dmg; if(this.hp<=0){this.hp=0; this.destroy();} }
        destroy() { if(!this.alive) return; this.alive=false; const explosionRadius=160, explosionDamage=50; for(const p of players){ if(!p.alive) continue; const d=dist(this,p); if(d<explosionRadius){ if(p.team!==this.team) p.takeDamage(explosionDamage,this.seats[0]?this.seats[0].id:null,this.team,'explosion'); else p.hp=Math.min(p.maxHp,p.hp+30); } } for(const p of this.seats) if(p){p.exitCar(); p.takeDamage(10,null,null,'explosion');} destroyedCarRemains.push({x:this.x,y:this.y,angle:this.angle,timer:5}); for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2; particles.push(new Particle(this.x,this.y,rand(-100,100),rand(-100,100),rand(0.4,1),'#ff4400',rand(3,6)));} sfxExplosion(); setTimeout(()=>this.reset(),5000); }
        reset() { this.alive=true; this.hp=this.maxHp; this.x=this.spawnX; this.y=this.spawnY; this.angle=rand(0,2*Math.PI); this.speed=0; this.team=null; this.seats[0]=null; this.seats[1]=null; this.stuckTimer=0; this.trueStuckTimer=0; }
        update(dt, buildings, walls, players, allCars) {
            if(!this.alive) return;
            const driver=this.seats[0];
            if(driver){
                let moveInput=0, turnInput=0;
                if(driver.isHuman){ if(keys['w']||keys['arrowup']) moveInput+=1; if(keys['s']||keys['arrowdown']) moveInput-=1; if(keys['a']||keys['arrowleft']) turnInput-=1; if(keys['d']||keys['arrowright']) turnInput+=1; }
                else {
                    if(driver.aiTarget&&driver.aiState==='combat'){ const targetAngle=angleBetween(this,driver.aiTarget); let diff=targetAngle-this.angle; while(diff>Math.PI) diff-=2*Math.PI; while(diff<-Math.PI) diff+=2*Math.PI; turnInput=clamp(diff*2,-1,1); moveInput=1; }
                    else if(driver.aiWanderTarget){ const targetAngle=angleBetween(this,driver.aiWanderTarget); let diff=targetAngle-this.angle; while(diff>Math.PI) diff-=2*Math.PI; while(diff<-Math.PI) diff+=2*Math.PI; turnInput=clamp(diff*2,-1,1); moveInput=0.5; }
                    const rayDist=80; let avoidX=0, avoidY=0;
                    for(const angleOff of [-0.3,0,0.3]){ const rayAngle=this.angle+angleOff; const rayX=this.x+Math.cos(rayAngle)*rayDist, rayY=this.y+Math.sin(rayAngle)*rayDist; let blocked=false; for(const b of buildings) if(b.alive&&rectCircleCollision(b.x,b.y,b.w,b.h,rayX,rayY,6)) blocked=true; for(const w of walls) if(w.alive&&pointToSegmentDist(rayX,rayY,w.x1,w.y1,w.x2,w.y2)<10) blocked=true; if(blocked){ avoidX-=Math.cos(rayAngle)*0.5; avoidY-=Math.sin(rayAngle)*0.5; } }
                    turnInput+=avoidX*0.5;
                }
                this.angle+=turnInput*this.turnSpeed*dt;
                this.speed+=moveInput*this.acceleration*dt;
                this.speed=clamp(this.speed,-this.maxSpeed*0.5,this.maxSpeed);
                let newX=this.x+Math.cos(this.angle)*this.speed*dt, newY=this.y+Math.sin(this.angle)*this.speed*dt;
                let collides=false;
                for(const b of buildings){ if(!b.alive) continue; if(b.isEnterable){ for(const w of b.walls) if(rectRectCollision(newX-this.w/2,newY-this.h/2,this.w,this.h,w.x,w.y,w.w,w.h)) collides=true; } else if(rectRectCollision(newX-this.w/2,newY-this.h/2,this.w,this.h,b.x,b.y,b.w,b.h)) collides=true; if(collides) break; }
                if(!collides) for(const w of walls) if(w.alive&&pointToSegmentDist(newX,newY,w.x1,w.y1,w.x2,w.y2)<Math.max(this.w,this.h)/2+w.thickness) collides=true;
                if(collides){ this.speed*=-0.3; newX=this.x; newY=this.y; }
                this.x=clamp(newX,this.w/2,MAP_W-this.w/2); this.y=clamp(newY,this.h/2,MAP_H-this.h/2);
                handleCarEdgePortal(this);
                const movedDist = Math.hypot(this.x - this.lastPosX, this.y - this.lastPosY);
                if (movedDist < 5) {
                    this.trueStuckTimer += dt;
                    if (this.trueStuckTimer > 5) {
                        this.speed = rand(50, 150);
                        this.angle = rand(0, Math.PI*2);
                        this.trueStuckTimer = 0;
                    }
                } else {
                    this.trueStuckTimer = 0;
                    this.lastPosX = this.x; this.lastPosY = this.y;
                }
                for(const p of players){ if(!p.alive||p.inCar) continue; if(p.hasEnemyFlag) continue; if(rectCircleCollision(this.x-this.w/2,this.y-this.h/2,this.w,this.h,p.x,p.y,p.radius)){ p.takeDamage(35,driver.id,driver.team,'car'); const angle=angleBetween(this,p); p.x+=Math.cos(angle)*4; p.y+=Math.sin(angle)*4; this.speed*=0.8; } }
                for(let i=0;i<2;i++){ const p=this.seats[i]; if(p){ const offset=i===0?this.w/2-8:-(this.w/2-8); p.x=this.x+Math.cos(this.angle)*offset; p.y=this.y+Math.sin(this.angle)*offset; p.angle=this.angle; } }
            } else { this.speed*=0.95; this.trueStuckTimer=0; }
        }
        draw(ctx, cam) {
            if(!this.alive) return;
            const sx=this.x-cam.x, sy=this.y-cam.y;
            ctx.save(); ctx.translate(sx,sy); ctx.rotate(this.angle);
            ctx.fillStyle='#334455'; ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
            ctx.strokeStyle='#aaa'; ctx.lineWidth=2; ctx.strokeRect(-this.w/2,-this.h/2,this.w,this.h);
            ctx.fillStyle='#fff'; ctx.fillRect(this.w/2-10,-this.h/2+4,8,6); ctx.fillRect(this.w/2-10,this.h/2-10,8,6);
            ctx.fillStyle='#ff3333'; ctx.fillRect(-this.w/2+2,-this.h/2+4,6,6); ctx.fillRect(-this.w/2+2,this.h/2-10,6,6);
            for(let i=0;i<2;i++){ const occ=this.seats[i]; if(occ){ const seatX=i===0?this.w/2-8:-this.w/2+8; ctx.fillStyle=TEAM_COLORS[occ.team]; ctx.beginPath(); ctx.arc(seatX,0,7,0,Math.PI*2); ctx.fill(); if(occ===player){ ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center'; ctx.fillText('YOU',seatX,-12); ctx.textAlign='start'; } } }
            ctx.restore();
            const hpPct=this.hp/this.maxHp; ctx.fillStyle='#333'; ctx.fillRect(sx-20,sy-this.h/2-12,40,4); ctx.fillStyle=hpPct>0.5?'#4f4':'#f22'; ctx.fillRect(sx-20,sy-this.h/2-12,40*hpPct,4);

    function initCars(){
        cars = [];
        for (let i = 0; i < 3; i++) { const x=rand(60, MAP_W/3-60); const y=rand(60, MAP_H-60); cars.push(new Car(x, y, i, rand(0, 2*Math.PI))); }

    }
    function generateMap(){
        buildings=[]; const placed=[]; const ss=[{w:80,h:60},{w:90,h:65},{w:70,h:75},{w:95,h:55},{w:65,h:80}];
        for(const s of ss){ let bx,by,overlap,a=0; do{ bx=rand(30,MAP_W-s.w-30); by=rand(30,MAP_H-s.h-30); overlap=false; for(const p of placed) if(rectRectCollision(bx-15,by-15,s.w+30,s.h+30,p.x,p.y,p.w,p.h)){ overlap=true; break; } for(const z of SPAWN_ZONES) if(rectRectCollision(bx,by,s.w,s.h,z.x,z.y,z.w,z.h)){ overlap=true; break; } a++; } while(overlap&&a<30); if(!overlap){ buildings.push(new Building(bx,by,s.w,s.h,rand(200,300),choice(['#6b705c','#7f7f7f','#8a817c']))); placed.push({x:bx,y:by,w:s.w,h:s.h}); } }
        for(let i=0;i<15;i++){ const w=rand(15,30),h=rand(15,30),bx=rand(30,MAP_W-w-30),by=rand(30,MAP_H-h-30); let overlap=false; for(const p of placed) if(rectRectCollision(bx-8,by-8,w+16,h+16,p.x,p.y,p.w,p.h)){ overlap=true; break; } for(const z of SPAWN_ZONES) if(rectRectCollision(bx,by,w,h,z.x-3,z.y-3,z.w+6,z.h+6)){ overlap=true; break; } if(!overlap){ buildings.push(new Building(bx,by,w,h,rand(50,100),choice(['#a68a64','#936639','#b08968']))); placed.push({x:bx,y:by,w,h}); } }
        for(let i=0;i<4;i++){ const w=rand(70,100),h=rand(50,75),bx=rand(35,MAP_W-w-35),by=rand(35,MAP_H-h-35); let overlap=false; for(const p of placed) if(rectRectCollision(bx-12,by-12,w+24,h+24,p.x,p.y,p.w,p.h)){ overlap=true; break; } for(const z of SPAWN_ZONES) if(rectRectCollision(bx,by,w,h,z.x-3,z.y-3,z.w+6,z.h+6)){ overlap=true; break; } if(!overlap){ buildings.push(new Building(bx,by,w,h,180,choice(['#8a7a6a','#7a6b5c']),true)); placed.push({x:bx,y:by,w:h}); } }

    function initPlayers(){

        const slots=[];

            for(let p=0;p<6;p++) slots.push({team:t,isShield:false,isCommander:false});
            slots.push({team:t,isShield:true,isCommander:false});
            slots.push({team:t,isShield:false,isCommander:true});
        }
        for(let i=slots.length-1;i>0;i--){ const j=randInt(0,i); [slots[i],slots[j]]=[slots[j],slots[i]]; }
        let assigned=false;

    function updateAI(dt,walls,cars){
        for(const bot of players){
            if(bot.isHuman||!bot.alive) continue;
            if(bot.stunned>0){ bot.vx*=0.5; bot.vy*=0.5; continue; }

                if(bot.slotAmmo[i]<=0 && !bot.slotReloading[i]) bot.startReload(i);
            }
            if (bot.inCar && bot.car && bot.car.alive && bot.carSeat === 1 && !bot.car.seats[0]) {

            }

                let nearestEnemy = null, nearestDist = 400;
                for (const p of players) {
                    if (p.team === bot.team || !p.alive) continue;
                    const d = dist(bot, p);
                    if (d < nearestDist && lineOfSightClear(bot.x,bot.y,p.x,p.y,buildings,walls)) {
                        nearestDist = d; nearestEnemy = p;
                    }
                }
                if (nearestEnemy) {
                    bot.aiTarget = nearestEnemy;
                    bot.aiState = 'combat';
                    if (bot.slotCooldown[4] <= 0) {
                        const a = angleBetween(bot, nearestEnemy);
                        bot.shoot(nearestEnemy.x, nearestEnemy.y, walls, cars);
                        bot.switchSlot(4);
                    }
                } else {
                    bot.aiState = 'wander';
                    bot.aiWanderTarget = { x: MAP_W/2 + rand(-200,200), y: MAP_H/2 + rand(-150,150) };
                }
                if (bot.aiWanderTarget) {
                    const wa = angleBetween(bot, bot.aiWanderTarget);
                    bot.angle = wa;
                    bot.vx += Math.cos(wa) * bot.speed * 0.4 * dt;
                    bot.vy += Math.sin(wa) * bot.speed * 0.4 * dt;
                }
                continue;
            }
            if (!bot.inCar && !bot.hasEnemyFlag && bot.hp <= bot.maxHp * 0.1 && bot.slots[4] && bot.slotCooldown[4] <= 0) {
                const placeX = bot.x + Math.cos(bot.angle) * 60;
                const placeY = bot.y + Math.sin(bot.angle) * 60;
                bot.switchSlot(4);
                bot.shoot(placeX, placeY, walls, cars);
            }
            if (!bot.hasEnemyFlag && bot.aiState !== 'combat' && dist(bot, CENTER_PORTAL) < 60 && Math.random() < 0.05 && !bot.inCar) {
                bot.aiWanderTarget = { x: CENTER_PORTAL.x, y: CENTER_PORTAL.y };
            }
            if (bot.inCar && !bot.hasEnemyFlag) {
                const enemyFlag = flags[1 - bot.team];
                if (dist(bot, enemyFlag) < 60) bot.exitCar();
            }
            if (bot.hasEnemyFlag) {
                const zone = SPAWN_ZONES[bot.team];
                bot.aiWanderTarget = { x: zone.x + zone.w/2, y: zone.y + zone.h/2 };
                bot.aiState = 'wander';

                }

                    let blocked = false;
                    for (const b of buildings) if (b.alive && rectCircleCollision(b.x,b.y,b.w,b.h, rayX,rayY, 6)) blocked = true;
                    for (const w of walls) if (w.alive && pointToSegmentDist(rayX,rayY, w.x1,w.y1,w.x2,w.y2) < 10) blocked = true;

                        nearestBlockDist = d;

            }

                    bot.shoot(bot.aiTarget.x+rand(-20,20), bot.aiTarget.y+rand(-20,20), walls, cars);
                    bot.aiAttackTimer = rand(0.8, 1.6);
                }
            } else {
                const wa = angleBetween(bot, bot.aiWanderTarget);
                let finalAngle = wa;
                const rayDist = 60;
                for (const angleOff of [-0.6, -0.3, 0, 0.3, 0.6]) {
                    const rayAngle = wa + angleOff;
                    const rayX = bot.x + Math.cos(rayAngle) * rayDist, rayY = bot.y + Math.sin(rayAngle) * rayDist;
                    let blocked = false;
                    for (const b of buildings) if (b.alive && rectCircleCollision(b.x,b.y,b.w,b.h, rayX,rayY, 6)) blocked = true;
                    for (const w of walls) if (w.alive && pointToSegmentDist(rayX,rayY, w.x1,w.y1,w.x2,w.y2) < 8) blocked = true;
                    if (blocked) { finalAngle += angleOff * 2; break; }
                }
                bot.angle = finalAngle;
                bot.vx += Math.cos(finalAngle) * bot.speed * 0.55 * dt;
                bot.vy += Math.sin(finalAngle) * bot.speed * 0.55 * dt;
            }
            if (!bot.hasEnemyFlag && !bot.inCar && !bot.isShieldBot) {
                const enemyF = flags[1 - bot.team];
                if (enemyF.carrier === null && dist(bot, enemyF) < 40) {
                    enemyF.pickUp(bot); sfxFlagPickup();
                }
            }
            if (!bot.hasEnemyFlag && !bot.inCar && Math.random() < 0.02) {
                const nc = cars.find(c => c.alive && (c.team===null||c.team===bot.team) && (c.seats[0]==null||c.seats[1]==null) && dist(bot,c)<70);
                if (nc) { const seat = nc.seats[0]==null?0:(nc.seats[1]==null?1:-1); if (seat!==-1) bot.enterCar(nc, seat); }
            }
            const spd = Math.sqrt(bot.vx**2+bot.vy**2);
            if (spd > bot.speed) { bot.vx = (bot.vx/spd)*bot.speed; bot.vy = (bot.vy/spd)*bot.speed; }
        }
    }

    let lastTime=performance.now();
    function update(dt){
        if(gameOver||homeScreen) return;
        dt=Math.min(dt,0.1); gameTime-=dt;
        for(let t=0;t<NUM_TEAMS;t++) if(teamSpeedBoost[t]>0) teamSpeedBoost[t]-=dt;
        if(gameTime<=0){ gameTime=0; gameOver=true; endGame(); }
        if (CENTER_PORTAL.cooldown > 0) CENTER_PORTAL.cooldown -= dt;
        for (const p of players) {
            if (!p.alive || p.inCar) continue;
            if (dist(p, CENTER_PORTAL) < CENTER_PORTAL.radius && CENTER_PORTAL.cooldown <= 0) {
                const target = getTeleportTarget(p);
                p.x = target.x; p.y = target.y;
                CENTER_PORTAL.cooldown = 1.5;
                sfxTeleport();
                for (let i=0;i<20;i++) particles.push(new Particle(p.x, p.y, rand(-50,50), rand(-50,50), 0.5, '#00ffff', 3));
            }
        }
        if(player&&player.alive&&!showRespawnScreen){
            if(!player.inCar){
                let mx=0,my=0;
                if(keys['w']||keys['arrowup']) my-=1; if(keys['s']||keys['arrowdown']) my+=1;
                if(keys['a']||keys['arrowleft']) mx-=1; if(keys['d']||keys['arrowright']) mx+=1;
                if(mx||my){ const len=Math.sqrt(mx*mx+my*my); mx/=len; my/=len; player.vx+=mx*player.speed*0.85*dt; player.vy+=my*player.speed*0.85*dt; const spd=Math.sqrt(player.vx**2+player.vy**2); if(spd>player.speed){ player.vx=(player.vx/spd)*player.speed; player.vy=(player.vy/spd)*player.speed; } }
                player.angle=angleBetween(player,{x:mouseWorldX,y:mouseWorldY});
                if(mouseDown&&player.slotCooldown[player.currentSlot]<=0&&!player.slotReloading[player.currentSlot]&&!player.meleeActive){
                    if(player.currentSlot<=2) player.shoot(mouseWorldX,mouseWorldY,walls,cars);
                    else if(player.currentSlot>=3&&mouseClicked){ player.shoot(mouseWorldX,mouseWorldY,walls,cars); mouseClicked=false; }
                }
                if(keyJustPressed['e']){ 
                    if (!player.hasEnemyFlag) {
                        const nc=cars.find(c=>c.alive&&(c.team===null||c.team===player.team)&&(c.seats[0]==null||c.seats[1]==null)&&dist(player,c)<60); 
                        if(nc){ const seat=nc.seats[0]==null?0:(nc.seats[1]==null?1:-1); if(seat!==-1) player.enterCar(nc,seat); } 
                    }
                }
                // Unstuck key Q
                if (keyJustPressed['q']) {
                    let closestDist = 50;
                    let targetWall = null;
                    for (const w of walls) {
                        if (!w.alive) continue;
                        const d = pointToSegmentDist(player.x, player.y, w.x1, w.y1, w.x2, w.y2);
                        if (d < closestDist) {
                            closestDist = d;
                            targetWall = w;
                        }
                    }
                    if (targetWall) {
                        targetWall.takeDamage(9999);
                    }
                }
                if (keyJustPressed['f']) {
                    const enemyFlag = flags[1 - player.team];
                    if (player.hasEnemyFlag) {
                        enemyFlag.drop(player.x, player.y);
                        player.hasEnemyFlag = false;
                        player.shields = [];
                    } else {
                        if (enemyFlag.carrier === null && dist(player, enemyFlag) < 40) {
                            enemyFlag.pickUp(player); sfxFlagPickup();
                        }
                    }
                }
            } else {
                if(keyJustPressed['e']) player.exitCar();
                if(mouseDown&&player.slotCooldown[player.currentSlot]<=0&&!player.slotReloading[player.currentSlot]&&!player.meleeActive){
                    if(player.currentSlot<=2) player.shoot(mouseWorldX,mouseWorldY,walls,cars);
                    else if(player.currentSlot>=3&&mouseClicked){ player.shoot(mouseWorldX,mouseWorldY,walls,cars); mouseClicked=false; }
                }
            }
        }
        // Scoring
        for (const p of players) {
            if (!p.alive || !p.hasEnemyFlag) continue;
            const zone = SPAWN_ZONES[p.team];
            if (p.x > zone.x && p.x < zone.x + zone.w && p.y > zone.y && p.y < zone.y + zone.h) {
                captures[p.team]++;
                flags[1 - p.team].returnToBase();
                p.hasEnemyFlag = false;
                p.shields = [];
                p.slots[2] = p.previousMelee || MELEE_DEFS[choice(Object.keys(MELEE_DEFS).filter(k => k !== 'Flag'))];
                p.previousMelee = null;
                teamSpeedBoost[p.team] = TEAM_BOOST_DURATION;
                sfxFlagScore();
                if (captures[p.team] >= MAX_CAPTURES) {
                    gameOver = true;
                    winnerTeam = p.team;
                    gameTime = 0;
                }
            }
        }
        for(const bot of players){ if(bot.isHuman||bot.alive) continue; if(!bot._respawnTimer) bot._respawnTimer=rand(3,6); bot._respawnTimer-=dt; if(bot._respawnTimer<=0){ bot.respawn(); bot._respawnTimer=null; } }
        updateAI(dt,walls,cars);
        for(const p of players) if(p.alive) p.update(dt,walls,players);
        for(const c of cars) c.update(dt,buildings,walls,players,cars);
        bullets=bullets.filter(b=>b.update(dt,cars,walls));
        for(const exp of explosives){ if(!exp.dead) exp.update(dt); } explosives=explosives.filter(e=>!e.dead);
        for(const d of disruptorProjectiles) if(!d.dead) d.update(dt); disruptorProjectiles=disruptorProjectiles.filter(d=>!d.dead);
        for(const cloud of smokeClouds) cloud.life-=dt; smokeClouds=smokeClouds.filter(c=>c.life>0);
        for(const p of particles) p.update(dt); particles=particles.filter(p=>!p.dead);
        for(const b of buildings) b.update(dt); buildings=buildings.filter(b=>b.alive);
        for(const w of walls) w.update(dt); walls=walls.filter(w=>w.alive);
        for(let i=destroyedCarRemains.length-1;i>=0;i--){ destroyedCarRemains[i].timer-=dt; if(destroyedCarRemains[i].timer<=0) destroyedCarRemains.splice(i,1); }
        for(let i=killFeed.length-1;i>=0;i--){ killFeed[i].timer-=dt; if(killFeed[i].timer<=0) killFeed.splice(i,1); }
        for(const bullet of bullets){
            if(bullet.dead) continue;
            for(const p of players) if(p.alive&&p.id!==bullet.shooterId&&dist(bullet,p)<p.radius+bullet.size){
                // Friendly bullets should not damage shields; they pass through
                if (p.hasEnemyFlag && p.shields && p.shields.length > 0 && bullet.team !== p.team) {
                    let absorbed = false;
                    for (let i = p.shields.length-1; i >= 0; i--) {
                        const shield = p.shields[i];
                        const shieldAngle = shield.angle + p.angle;
                        const shieldX = p.x + Math.cos(shieldAngle) * 30;
                        const shieldY = p.y + Math.sin(shieldAngle) * 30;
                        const d = dist({x: shieldX, y: shieldY}, bullet);
                        if (d < SHIELD_RADIUS + bullet.size) {
                            shield.hp -= bullet.damage / 10;
                            sfxShieldHit();
                            if (shield.hp <= 0) {
                                p.shields.splice(i, 1);
                                for (let j=0;j<8;j++) particles.push(new Particle(shieldX, shieldY, rand(-30,30), rand(-30,30), 0.3, '#00ffff', 2));
                            }
                            bullet.range = 0;
                            absorbed = true;
                            break;
                        }
                    }
                    if (absorbed) continue;
                }
                // Now handle the bullet normally (friendly fire heals, enemy damages)
                if(p.team===bullet.team){ p.hp=Math.min(p.maxHp,p.hp+bullet.damage*0.5); bullet.range=0; }
                else { p.takeDamage(bullet.damage,bullet.shooterId,bullet.team,'bullet'); bullet.range=0; sfxHit(); break; }
            }
        }
        bullets=bullets.filter(b=>!b.dead);
        for (const flag of flags) flag.update(dt);
        if(player&&player.alive){ camera.x=player.x-W/2; camera.y=player.y-H/2; }
        mouseWorldX=mouseX+camera.x; mouseWorldY=mouseY+camera.y; mouseClicked=false; keyJustPressed={};
    }
    function endGame(){ 
        gameOver=true; gameEndTime=performance.now(); 
        if (captures[0] !== captures[1]) winnerTeam = captures[0] > captures[1] ? 0 : 1;
        else winnerTeam = -1;
    }
    function restartGame(){ 
        if(gameOver&&performance.now()-gameEndTime<3000) return; 
        gameTime=GAME_DURATION; gameOver=false; winnerTeam=-1; 
        bullets=[]; particles=[]; explosives=[]; smokeClouds=[]; killFeed=[]; showRespawnScreen=false; 
        buildings=[]; walls=[]; disruptorProjectiles=[]; destroyedCarRemains=[]; 
        cars.forEach(c=>c.reset()); 
        playerRallyPoint=null; teamRallyPoints=[null,null]; 
        captures = [0,0];
        teamSpeedBoost = [0,0];
        flags.forEach(f => f.returnToBase());
        respawnCenterPortal();
        generateMap(); initPlayers(); 
        if(player){ camera.x=player.x-W/2; camera.y=player.y-H/2; } 
        gameEndTime=0; 
    }

    function drawGameOverScreen(){ 
        ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H); const cx=W/2,cy=H/2; ctx.textAlign='center';
        if(winnerTeam>=0){ ctx.fillStyle=TEAM_COLORS[winnerTeam]; ctx.font='bold 40px'; ctx.fillText(`${TEAM_NAMES[winnerTeam]} TEAM WINS!`,cx,cy-50); }
        else { ctx.fillStyle='#fff'; ctx.font='bold 40px'; ctx.fillText('DRAW!',cx,cy-50); }
        for(let t=0;t<NUM_TEAMS;t++){ ctx.fillStyle=TEAM_COLORS[t]; ctx.font='20px'; ctx.fillText(`${TEAM_NAMES[t]}: ${captures[t]} captures`,cx,cy-10+t*28); }
        const elapsed=performance.now()-gameEndTime; 
        if(elapsed<3000){ ctx.fillStyle='#fff'; ctx.font='18px'; ctx.fillText(`Next round in ${Math.ceil((3000-elapsed)/1000)}s...`,cx,cy+110); }
        else { ctx.fillStyle='#fff'; ctx.font='18px'; ctx.fillText('Click or R to restart',cx,cy+110); }
        const homeBtnW=120,homeBtnH=40,homeBtnX=20,homeBtnY=20; 
        ctx.fillStyle='#e74c3c'; ctx.fillRect(homeBtnX,homeBtnY,homeBtnW,homeBtnH); ctx.fillStyle='#fff'; ctx.font='bold 18px'; ctx.textAlign='center'; ctx.fillText('HOME',homeBtnX+homeBtnW/2,homeBtnY+28); window._gameoverHomeBtn={x:homeBtnX,y:homeBtnY,w:homeBtnW,h:homeBtnH}; ctx.textAlign='start'; 
    }
    function drawKillFeed() {
        let kfX = W - 180, kfY = 100;
        ctx.textAlign = 'right';
        for (const kf of killFeed) {
            let segments = [];
            if (kf.killerName) {
                if (kf.streakLevel >= 2) {
                    const streakText = STREAK_NAMES[Math.min(kf.streakLevel, STREAK_NAMES.length - 1)] + '! ';
                    segments.push({ text: streakText, color: '#ffaa00' });
                }
                const verb = kf.deathVerb;
                if (kf.isTeamkill) {
                    segments.push({ text: kf.victimName, color: TEAM_COLORS[kf.victimTeam] });
                    segments.push({ text: ` ${verb} `, color: '#aaaaaa' });
                    segments.push({ text: kf.killerName, color: TEAM_COLORS[kf.killerTeam] });
                    segments.push({ text: ' (-1)', color: '#ff4444' });
                } else {
                    segments.push({ text: kf.victimName, color: TEAM_COLORS[kf.victimTeam] });
                    segments.push({ text: ` ${verb} `, color: '#ffffff' });
                    segments.push({ text: kf.killerName, color: TEAM_COLORS[kf.killerTeam] });
                }
            } else {
                segments.push({ text: kf.victimName, color: TEAM_COLORS[kf.victimTeam] });
                segments.push({ text: ` was killed by ${kf.deathType}`, color: '#ffffff' });
            }
            let totalWidth = 0;
            ctx.font = 'bold 14px "Segoe UI", sans-serif';
            for (const seg of segments) totalWidth += ctx.measureText(seg.text).width;
            const barHeight = 20, padX = 6, padY = 2;
            let drawX = kfX - totalWidth - padX;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(drawX, kfY - barHeight/2 - padY, totalWidth + padX*2, barHeight + padY*2);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.strokeRect(drawX, kfY - barHeight/2 - padY, totalWidth + padX*2, barHeight + padY*2);
            drawX = kfX;
            for (const seg of segments) {
                const rgb = hexToRgb(seg.color);
                ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${Math.min(1, kf.timer)})`;
                ctx.fillText(seg.text, drawX, kfY);
                drawX -= ctx.measureText(seg.text).width;
            }
            kfY += 24;
        }
        ctx.textAlign = 'start';
    }

    function drawPortal(ctx, cam, portal) {
        const sx = portal.x - cam.x, sy = portal.y - cam.y;
        const time = performance.now() / 1000;
        const glow = Math.sin(time * 3) * 0.3 + 0.7;
        ctx.save();
        ctx.fillStyle = `rgba(0, 255, 255, ${glow * 0.4})`;
        ctx.beginPath();
        ctx.arc(sx, sy, portal.radius + 5, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.arc(sx, sy, portal.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx, sy, portal.radius/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    function drawShields(player, ctx, cam) {
        if (!player.shields || player.shields.length === 0) return;
        const sx = player.x - cam.x;
        const sy = player.y - cam.y;
        for (const shield of player.shields) {
            const angle = shield.angle + player.angle;
            const shieldX = sx + Math.cos(angle) * 35;
            const shieldY = sy + Math.sin(angle) * 35;
            const hpPct = shield.hp / SHIELD_HP;
            ctx.save();
            ctx.strokeStyle = `rgba(0, 255, 255, ${hpPct})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(shieldX, shieldY, SHIELD_RADIUS, 0, Math.PI*2);
            ctx.stroke();
            ctx.fillStyle = `rgba(0, 255, 255, ${hpPct * 0.3})`;
            ctx.beginPath();
            ctx.arc(shieldX, shieldY, SHIELD_RADIUS-3, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    }

    function render(){
        ctx.clearRect(0,0,W,H);
        if(homeScreen){ drawHomeScreen(); return; }
        ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.fillText('RIOT CTF (8v8)',20,35);
        if(player){ ctx.fillStyle='#fff'; ctx.font='bold 14px "Segoe UI",sans-serif'; ctx.textAlign='right'; ctx.fillText(`K: ${player.kills}  D: ${player.deaths}`,W-20,30); ctx.textAlign='start'; }
        ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1; const gs=60,sgx=-(camera.x%gs),sgy=-(camera.y%gs);
        for(let gx=sgx;gx<W;gx+=gs){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
        for(let gy=sgy;gy<H;gy+=gs){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

        ctx.strokeStyle = 'rgba(128, 128, 128, 0.8)';
        ctx.lineWidth = 4;
        ctx.strokeRect(0 - camera.x, 0 - camera.y, MAP_W, MAP_H);

        for(const b of buildings){ if(!b.alive) continue; const sx=b.x-camera.x,sy=b.y-camera.y; if(sx+b.w<-10||sx>W+10||sy+b.h<-10||sy>H+10) continue;
            if(b.isPlaced){ ctx.fillStyle='rgba(74,144,226,0.8)'; ctx.fillRect(sx,sy,b.w,b.h); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(sx,sy,b.w,b.h); }
            else if(b.isEnterable){ ctx.fillStyle='rgba(40,35,30,0.5)'; ctx.fillRect(sx,sy,b.w,b.h); for(const w of b.walls){ const wx=w.x-camera.x,wy=w.y-camera.y; ctx.fillStyle='#6b5e4e'; ctx.fillRect(wx,wy,w.w,w.h); ctx.strokeStyle='#3a3228'; ctx.lineWidth=1.5; ctx.strokeRect(wx,wy,w.w,w.h); } }
            else { ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(sx+4,sy+4,b.w,b.h); const alpha=b.hp/b.maxHp; ctx.fillStyle=`rgb(${Math.floor(parseInt(b.color.slice(1,3),16)*alpha+30*(1-alpha))},${Math.floor(parseInt(b.color.slice(3,5),16)*alpha+20*(1-alpha))},${Math.floor(parseInt(b.color.slice(5,7),16)*alpha+15*(1-alpha))})`; ctx.fillRect(sx,sy,b.w,b.h); if(b.flashAlpha!==0){ ctx.fillStyle=`rgba(255,255,255,${Math.abs(b.flashAlpha)})`; ctx.fillRect(sx,sy,b.w,b.h); } ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2; ctx.strokeRect(sx,sy,b.w,b.h); if(b.hp<b.maxHp*0.6){ ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; for(let c=0;c<Math.floor((1-b.hp/b.maxHp)*5);c++){ ctx.beginPath(); ctx.moveTo(sx+rand(5,b.w-5),sy+rand(5,b.h-5)); ctx.lineTo(sx+rand(-20,20)+rand(5,b.w-5),sy+rand(-20,20)+rand(5,b.h-5)); ctx.stroke(); } } }
        }
        for(const w of walls) w.draw(ctx,camera);
        for(const d of disruptorProjectiles) d.draw(ctx,camera);
        for(const c of cars) if(c.alive){ c.draw(ctx,camera); if(player&&player.alive&&!player.inCar&&dist(player,c)<60&&(c.team===null||c.team===player.team)&&(c.seats[0]==null||c.seats[1]==null)){ ctx.fillStyle='#fff'; ctx.font='bold 13px'; ctx.textAlign='center'; ctx.fillText('Press E to enter',c.x-camera.x,c.y-camera.y-c.h/2-6); ctx.textAlign='start'; } }
        for(const rem of destroyedCarRemains){ const sx=rem.x-camera.x,sy=rem.y-camera.y; ctx.save(); ctx.translate(sx,sy); ctx.rotate(rem.angle); ctx.fillStyle='#333'; ctx.fillRect(-30,-17,60,35); ctx.fillStyle='#aa3333'; ctx.globalAlpha=0.5; ctx.fillRect(-30,-17,60,35); ctx.globalAlpha=1; ctx.restore(); }
        for(const cloud of smokeClouds){ const sx=cloud.x-camera.x,sy=cloud.y-camera.y,a=cloud.life/cloud.maxLife; ctx.fillStyle=cloud.isSmoke?`rgba(180,180,180,${a*0.5})`:`rgba(255,100,20,${a*0.35})`; ctx.beginPath(); ctx.arc(sx,sy,cloud.radius,0,Math.PI*2); ctx.fill(); if(!cloud.isSmoke) for(let i=0;i<8;i++){ const aa=Math.random()*Math.PI*2,rr=rand(10,cloud.radius*0.8); ctx.fillStyle=`rgba(255,${rand(80,200)},0,${a*0.7})`; ctx.beginPath(); ctx.arc(sx+Math.cos(aa)*rr,sy+Math.sin(aa)*rr,rand(3,8),0,Math.PI*2); ctx.fill(); } }
        for(const p of particles){ const sx=p.x-camera.x,sy=p.y-camera.y; ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(sx,sy,p.size,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
        for(const exp of explosives) if(!exp.dead){ const sx=exp.x-camera.x,sy=exp.y-camera.y; ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle=exp.def.name==='Molotov'?'#ff6600':'#555'; ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill(); if(exp.fuse<0.6&&Math.floor(exp.fuse*20)%2===0){ ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(sx,sy,9,0,Math.PI*2); ctx.fill(); } }
        for(const bullet of bullets){ const sx=bullet.x-camera.x,sy=bullet.y-camera.y; if(bullet.trail.length>1){ ctx.strokeStyle=bullet.color+'88'; ctx.lineWidth=bullet.size*0.7; ctx.beginPath(); ctx.moveTo(bullet.trail[0].x-camera.x,bullet.trail[0].y-camera.y); for(const t of bullet.trail) ctx.lineTo(t.x-camera.x,t.y-camera.y); ctx.lineTo(sx,sy); ctx.stroke(); } ctx.fillStyle=bullet.color; ctx.beginPath(); ctx.arc(sx,sy,bullet.size,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,bullet.size*0.4,0,Math.PI*2); ctx.fill(); }
        drawPortal(ctx, camera, CENTER_PORTAL);
        const sortedPlayers=[...players].filter(p=>p.alive&&!p.inCar).sort((a,b)=>a.y-b.y);
        for(const p of sortedPlayers){ const sx=p.x-camera.x,sy=p.y-camera.y; if(sx<-30||sx>W+30||sy<-30||sy>H+30) continue;
            if(p.isShieldBot){ ctx.fillStyle=TEAM_COLORS[p.team]+'aa'; ctx.beginPath(); ctx.arc(sx,sy,p.radius+4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
            if(p.disruptorImmune>0){ ctx.fillStyle=`rgba(100,180,255,${0.3+Math.sin(performance.now()*10)*0.2})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+6,0,Math.PI*2); ctx.fill(); }
            if(p.spawnImmunity>0){ ctx.fillStyle=`rgba(255,255,255,${0.4+Math.sin(p.spawnImmunity*15)*0.3})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+5,0,Math.PI*2); ctx.fill(); }
            ctx.fillStyle=TEAM_COLORS[p.team]; ctx.beginPath(); ctx.arc(sx,sy,p.radius,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=p.isHuman?'#fff':'rgba(0,0,0,0.6)'; ctx.lineWidth=p.isHuman?3:2; ctx.stroke();
            if(p.isCommander&&p.team===playerTeam){ ctx.strokeStyle='#ffaa00'; ctx.lineWidth=3; ctx.stroke(); }
            if(p.flashAlpha>0){ ctx.fillStyle=`rgba(255,255,255,${p.flashAlpha})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius,0,Math.PI*2); ctx.fill(); }
            if(p.explosiveLocked>0){ const pulse=Math.sin(performance.now()*0.02)*0.3+0.6; ctx.fillStyle=`rgba(255,68,255,${pulse})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#ff44ff'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText('🔒',sx,sy-p.radius-20); ctx.textAlign='start'; }
            if (p.hasEnemyFlag) { ctx.fillStyle = TEAM_COLORS[1-p.team]; ctx.fillRect(sx-7, sy-p.radius-14, 14, 9); }
            const barrelLen=p.radius+8; ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(sx+Math.cos(p.angle)*(p.radius-2),sy+Math.sin(p.angle)*(p.radius-2)); ctx.lineTo(sx+Math.cos(p.angle)*barrelLen,sy+Math.sin(p.angle)*barrelLen); ctx.stroke();
            if(p.meleeActive&&p.slots[2]){ const def = p.hasEnemyFlag ? MELEE_DEFS['Flag'] : p.slots[2]; const range = def.range; const arc = def.arc; ctx.strokeStyle='rgba(255,255,200,0.7)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(sx,sy,range,p.meleeAngle-arc,p.meleeAngle+arc); ctx.stroke(); ctx.fillStyle='rgba(255,255,200,0.25)'; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.arc(sx,sy,range,p.meleeAngle-arc,p.meleeAngle+arc); ctx.closePath(); ctx.fill(); }
            const hpBarW=p.radius*2,hpBarH=4,hpBarY=sy-p.radius-10; ctx.fillStyle='#333'; ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW,hpBarH);
            ctx.fillStyle=(p.hp/p.maxHp)>0.5?'#4f4':(p.hp/p.maxHp)>0.25?'#ff0':'#f22'; ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW*(p.hp/p.maxHp),hpBarH);
            if(p.isHuman){ ctx.fillStyle='#fff'; ctx.font='bold 11px'; ctx.textAlign='center'; ctx.fillText('YOU',sx,sy-p.radius-14); ctx.textAlign='start'; }
            if(p.isShieldBot){ ctx.fillStyle='#fff'; ctx.font='bold 10px'; ctx.fillText('SHIELD',sx,sy-p.radius-14); }
            if(p.isCommander&&p.team===playerTeam){ ctx.fillStyle='#ffaa00'; ctx.font='bold 10px'; ctx.fillText('CMDR',sx,sy-p.radius-14); }
            if(p.slotReloading && p.slotReloading[p.currentSlot]){ ctx.fillStyle='#fff'; ctx.font='10px'; ctx.fillText('⟳',sx,sy+p.radius+14); }
            if(p.stunned>0){ ctx.fillStyle='#ff0'; ctx.font='bold 12px'; ctx.fillText('★',sx,sy-p.radius-16); }
            if (p.hasEnemyFlag) drawShields(p, ctx, camera);
        }
        for (const flag of flags) flag.draw(ctx, camera);
        if(player&&player.alive&&!showRespawnScreen&&player.currentSlot<=1&&!player.inCar){ const def=player.slots[player.currentSlot]; if(def&&def.range&&player.slotCooldown[player.currentSlot]<=0.2){ const sx=player.x-camera.x,sy=player.y-camera.y; ctx.beginPath(); ctx.arc(sx,sy,def.range,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke(); } }
        drawKillFeed();
        drawMinimap(); drawScoreboard(); drawHotbar(); drawPlayerHealthBar();
        if(gameOver) drawGameOverScreen();
        if(showRespawnScreen) drawRespawnScreen();
        if(!gameOver&&!showRespawnScreen&&player&&player.alive){ ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(mouseX,mouseY,12,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(mouseX-16,mouseY); ctx.lineTo(mouseX-8,mouseY); ctx.moveTo(mouseX+8,mouseY); ctx.lineTo(mouseX+16,mouseY); ctx.moveTo(mouseX,mouseY-16); ctx.lineTo(mouseX,mouseY-8); ctx.moveTo(mouseX,mouseY+8); ctx.lineTo(mouseX,mouseY+16); ctx.stroke(); }
    }

    function gameLoop(ts){ let dt=(ts-lastTime)/1000; if(dt<=0) dt=0.016; lastTime=ts; update(dt); render(); requestAnimationFrame(gameLoop); }

    canvas.addEventListener('mousemove',e=>{ const rect=canvas.getBoundingClientRect(); mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top; canvas.style.cursor=(homeScreen||showRespawnScreen||gameOver)?'pointer':'crosshair'; });
    canvas.addEventListener('mousedown',e=>{ if(e.button===0){ initAudio(); const rect=canvas.getBoundingClientRect(),cx=e.clientX-rect.left,cy=e.clientY-rect.top; if(homeScreen){ const btn=window._homeStartBtn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h){ homeScreen=false; gameTime = GAME_DURATION; gameOver = false; showRespawnScreen = false; playerRallyPoint=null; initCars(); generateMap(); initPlayers(); respawnCenterPortal(); flags.forEach(f=>f.returnToBase()); captures=[0,0]; teamSpeedBoost=[0,0]; if(player){ camera.x=player.x-W/2; camera.y=player.y-H/2; } lastTime=performance.now(); canvas.style.cursor='crosshair'; } return; } if(gameOver){ const homeBtn=window._gameoverHomeBtn; if(homeBtn&&cx>=homeBtn.x&&cx<=homeBtn.x+homeBtn.w&&cy>=homeBtn.y&&cy<=homeBtn.y+homeBtn.h){ homeScreen=true; gameOver=false; showRespawnScreen=false; canvas.style.cursor='pointer'; return; } restartGame(); return; } if(showRespawnScreen&&player){ const homeBtn=window._deathHomeBtn; if(homeBtn&&cx>=homeBtn.x&&cx<=homeBtn.x+homeBtn.w&&cy>=homeBtn.y&&cy<=homeBtn.y+homeBtn.h){ homeScreen=true; showRespawnScreen=false; gameOver=false; canvas.style.cursor='pointer'; return; } const btn=window._respawnBtn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h){ player.respawn(); showRespawnScreen=false; canvas.style.cursor='crosshair'; } return; } mouseDown=true; mouseClicked=true; } });
    canvas.addEventListener('mouseup',e=>{ if(e.button===0) mouseDown=false; });
    canvas.addEventListener('contextmenu',e=>{ e.preventDefault(); if(homeScreen||gameOver||showRespawnScreen) return; if(playerRallyPoint) playerRallyPoint=null; else playerRallyPoint={x:mouseWorldX,y:mouseWorldY}; });
    canvas.addEventListener('wheel',e=>{ if(homeScreen||gameOver||showRespawnScreen) return; if(!player||!player.alive) return; if(player.hasEnemyFlag) return; e.preventDefault(); const delta=e.deltaY>0?1:-1; let newSlot=player.currentSlot+delta; if(newSlot<0) newSlot=4; else if(newSlot>4) newSlot=0; player.switchSlot(newSlot); },{passive:false});
    window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; initAudio(); if(!keyJustPressed[e.key.toLowerCase()]) keyJustPressed[e.key.toLowerCase()]=true; if(e.key==='r'||e.key==='R'){ if(gameOver){ restartGame(); return; } if(player&&player.alive&&player.currentSlot<=1) player.startReload(player.currentSlot); } if(e.key>='1'&&e.key<='5'){ const slot=parseInt(e.key)-1; if(player&&player.alive&&!showRespawnScreen) player.switchSlot(slot); } });
    window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

    function init(){ lastTime=performance.now(); requestAnimationFrame(gameLoop); }
    init();
})();
</script>
</body>
</html>
