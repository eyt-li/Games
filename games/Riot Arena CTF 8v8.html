<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riot Arena – Capture The Flag</title>
    <style>
        :root { --bg: #000035; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
        canvas { display: block; border: 2px solid #1a1a5e; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,0.6); cursor: crosshair; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function() {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = Math.min(window.innerWidth - 20, 1200);
    const H = Math.min(window.innerHeight - 20, 750);
    canvas.width = W; canvas.height = H;

    const MAP_W = 1200, MAP_H = 800;
    const GAME_DURATION = 180;
    const TEAM_COLORS = ['#3498db', '#e74c3c'];
    const TEAM_NAMES = ['Blue', 'Red'];
    const NUM_TEAMS = 2, PLAYERS_PER_TEAM = 10;
    const MAX_CAPTURES = 3;

    const SPAWN_ZONES = [
        { x: 25, y: 25, w: 55, h: MAP_H - 50 },
        { x: MAP_W - 80, y: 25, w: 55, h: MAP_H - 50 }
    ];

    // Death message verbs
    const DEATH_VERBS = {
        bullet: ['shot', 'gunned down', 'picked off'],
        explosion: ['blown up', 'obliterated', 'detonated'],
        car: ['run over', 'rammed', 'splattered'],
        melee: ['sliced', 'bashed', 'pummeled'],
        fire: ['incinerated', 'burned', 'roasted'],
        unknown: ['eliminated', 'destroyed', 'fragged', 'wiped out', 'took down', 'neutralized', 'obliterated', 'iced']
    };
    const TEAMKILL_VERBS = {
        bullet: ['accidentally shot', 'friendly-fired on'],
        explosion: ['accidentally blew up', 'friendly-demolished'],
        car: ['accidentally ran over', 'friendly-rammed'],
        melee: ['accidentally sliced', 'friendly-bashed'],
        fire: ['accidentally burned', 'friendly-roasted'],
        unknown: ['betrayed', 'team-killed', 'friendly-fired', 'backstabbed', 'TK\'d', 'misfired on', 'oopsied']
    };
    const STREAK_NAMES = ["", "", "Double Kill", "Triple Kill", "Quadra Kill", "Penta Kill", "Mega Kill", "Ultra Kill", "Monster Kill", "Ludicrous Kill", "Godlike!"];

    // ---------- FLAG CLASS ----------
    class Flag {
        constructor(team) {
            this.team = team;
            this.homeX = team === 0 ? 80 : MAP_W - 80;
            this.homeY = MAP_H / 2;
            this.x = this.homeX;
            this.y = this.homeY;
            this.carrier = null;
            this.dropped = false;
            this.droppedTimer = 0;
            this.waveOffset = 0;
        }
        drop(x, y) {
            this.x = x; this.y = y;
            this.carrier = null;
            this.dropped = true;
            this.droppedTimer = 30;
        }
        pickUp(player) {
            this.carrier = player;
            this.dropped = false;
            player.hasEnemyFlag = true;
        }
        returnToBase() {
            this.x = this.homeX;
            this.y = this.homeY;
            this.carrier = null;
            this.dropped = false;
        }
        update(dt) {
            this.waveOffset += dt * 3;
            if (this.carrier) {
                this.x = this.carrier.x;
                this.y = this.carrier.y - 16;
            }
            if (this.dropped) {
                this.droppedTimer -= dt;
                if (this.droppedTimer <= 0) this.returnToBase();
            }
        }
        draw(ctx, cam) {
            const sx = this.x - cam.x, sy = this.y - cam.y;
            const color = TEAM_COLORS[this.team];
            const poleH = 38, bannerW = 20, bannerH = 15;
            if (!this.carrier) {
                const alpha = 0.2 + Math.sin(this.waveOffset) * 0.1;
                const grd = ctx.createRadialGradient(sx, sy - poleH/2, 4, sx, sy - poleH/2, 42);
                grd.addColorStop(0, `rgba(255,255,200,${alpha+0.25})`);
                grd.addColorStop(1, 'rgba(255,200,50,0)');
                ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(sx, sy - poleH/2, 42, 0, Math.PI*2); ctx.fill();
            }
            ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - poleH); ctx.stroke();
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(sx, sy - poleH, 4, 0, Math.PI*2); ctx.fill();
            const waveShift = Math.sin(this.waveOffset) * 2;
            ctx.fillStyle = color; ctx.fillRect(sx + 2, sy - poleH + 4 + waveShift, bannerW, bannerH);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.strokeRect(sx + 2, sy - poleH + 4 + waveShift, bannerW, bannerH);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(this.team === 0 ? 'B' : 'R', sx + bannerW/2 + 2, sy - poleH + bannerH/2 + 4 + waveShift);
            ctx.textAlign = 'start';
            if (this.carrier) {
                ctx.fillStyle = color; ctx.fillRect(sx - 6, sy - 10, 12, 10);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 8px'; ctx.fillText(this.team === 0 ? 'B' : 'R', sx-2, sy-2);
            }
        }
    }

    const flags = [new Flag(0), new Flag(1)];
    let captures = [0, 0];

    // ---------- HELPER FUNCTIONS ----------
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:255,g:255,b:255};
    }
    const keys = {};
    let mouseX = W/2, mouseY = H/2, mouseDown = false, mouseClicked = false;
    let mouseWorldX = 0, mouseWorldY = 0;
    let keyJustPressed = {};
    let playerRallyPoint = null;
    let teamRallyPoints = [null, null];

    let audioCtx = null;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    function playSound(f,d,t='square',v=0.08) { if(!audioCtx) return; try { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f,audioCtx.currentTime); g.gain.setValueAtTime(v,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){} }
    function sfxShoot(){ playSound(200,0.08,'square',0.06); playSound(80,0.1,'sawtooth',0.04); }
    function sfxHit(){ playSound(60,0.15,'sawtooth',0.07); }
    function sfxExplosion(){ playSound(30,0.4,'sawtooth',0.15); playSound(15,0.5,'triangle',0.12); }
    function sfxMelee(){ playSound(120,0.12,'square',0.05); playSound(40,0.08,'triangle',0.06); }
    function sfxSwitch(){ playSound(600,0.05,'sine',0.03); }
    function sfxReload(){ playSound(300,0.1,'triangle',0.04); playSound(400,0.08,'triangle',0.03); }
    function sfxFlagPickup(){ playSound(400,0.2,'sine',0.1); playSound(600,0.15,'triangle',0.08); }
    function sfxFlagScore(){ playSound(800,0.3,'square',0.15); playSound(1000,0.2,'triangle',0.1); }

    function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }
    function angleBetween(a,b){ return Math.atan2(b.y-a.y,b.x-a.x); }
    function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
    function rand(min,max){ return Math.random()*(max-min)+min; }
    function randInt(min,max){ return Math.floor(rand(min,max+1)); }
    function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    function pointToSegmentDist(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        if(dx === 0 && dy === 0) return Math.hypot(px-ax, py-ay);
        const t = clamp(((px-ax)*dx + (py-ay)*dy) / (dx*dx+dy*dy), 0, 1);
        return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
    }
    function lineOfSightClear(x1,y1,x2,y2, buildings, walls) {
        for(const b of buildings) if(b.alive) {
            if(b.isEnterable) { for(const w of b.walls) if(lineRectIntersection(x1,y1,x2,y2, w.x,w.y,w.w,w.h)) return false; }
            else if(lineRectIntersection(x1,y1,x2,y2, b.x,b.y,b.w,b.h)) return false;
        }
        for(const w of walls) if(w.alive) {
            if(pointToSegmentDist((x1+x2)/2, (y1+y2)/2, w.x1,w.y1,w.x2,w.y2) < w.thickness + 8) return false;
        }
        return true;
    }
    function rectCircleCollision(rx,ry,rw,rh,cx,cy,cr){ const cx2=clamp(cx,rx,rx+rw), cy2=clamp(cy,ry,ry+rh); return dist({x:cx2,y:cy2},{x:cx,y:cy})<cr; }
    function rectRectCollision(a,b,c,d,e,f,g,h){ return a<e+g && a+c>e && b<f+h && b+d>f; }
    function lineRectIntersection(x1,y1,x2,y2,rx,ry,rw,rh){ if(x1>=rx&&x1<=rx+rw&&y1>=ry&&y1<=ry+rh) return true; if(x2>=rx&&x2<=rx+rw&&y2>=ry&&y2<=ry+rh) return true; const edges=[[rx,ry,rx+rw,ry],[rx+rw,ry,rx+rw,ry+rh],[rx+rw,ry+rh,rx,ry+rh],[rx,ry+rh,rx,ry]]; for(const e of edges) if(segmentsIntersect(x1,y1,x2,y2,e[0],e[1],e[2],e[3])) return true; return false; }
    function segmentsIntersect(x1,y1,x2,y2,x3,y3,x4,y4){ const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4); if(Math.abs(d)<0.0001) return false; const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d, u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d; return t>=0&&t<=1&&u>=0&&u<=1; }

    if (!ctx.roundRect) {
        ctx.roundRect = function (x, y, w, h, r) {
            if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
            this.beginPath(); this.moveTo(x + r.tl, y); this.lineTo(x + w - r.tr, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r.tr); this.lineTo(x + w, y + h - r.br);
            this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h); this.lineTo(x + r.bl, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r.bl); this.lineTo(x, y + r.tl);
            this.quadraticCurveTo(x, y, x + r.tl, y); this.closePath();
        };
    }

    let homeScreen = true;
    let gameTime = GAME_DURATION, gameOver = false, winnerTeam = -1, playerTeam = -1;
    let gameEndTime = 0;
    let players = [], buildings = [], bullets = [], particles = [], explosives = [], smokeClouds = [], walls = [];
    let disruptorProjectiles = [];
    let cars = [], destroyedCarRemains = [];
    let player = null, camera = { x:0, y:0 };
    let showRespawnScreen = false;
    let killFeed = [];

    const CAR_RAM_DAMAGE_BUILDING = 40;
    const CAR_RAM_DAMAGE_WALL = 30;

    // ---------- CLASS DEFINITIONS ----------
    class Car {
        constructor(x, y, id, angle = 0) {
            this.id = id; this.spawnX = x; this.spawnY = y;
            this.x = x; this.y = y; this.w = 60; this.h = 35;
            this.angle = angle; this.speed = 0;
            this.maxSpeed = 200; this.acceleration = 150; this.turnSpeed = 2.2;
            this.maxHp = 80; this.hp = 80;
            this.alive = true; this.seats = [null, null]; this.team = null;
            this.stuckTimer = 0;
        }
        takeDamage(dmg) { if (!this.alive) return; this.hp -= dmg; if (this.hp <= 0) { this.hp = 0; this.destroy(); } }
        heal(amount) { if (!this.alive) return; this.hp = Math.min(this.maxHp, this.hp + amount); }
        destroy() {
            if (!this.alive) return; this.alive = false;
            const explosionRadius = 160, explosionDamage = 50, healAmount = 30;
            for (const p of players) {
                if (!p.alive) continue;
                const d = dist(this, p);
                if (d < explosionRadius) {
                    if (p.team !== this.team) p.takeDamage(explosionDamage, this.seats[0] ? this.seats[0].id : null, this.team, 'explosion');
                    else p.hp = Math.min(p.maxHp, p.hp + healAmount);
                }
            }
            for (const p of this.seats) if (p) { p.exitCar(); p.takeDamage(10, null, null, 'explosion'); }
            destroyedCarRemains.push({x: this.x, y: this.y, angle: this.angle, timer: 5});
            for (let i=0;i<30;i++){ const a=Math.random()*Math.PI*2; particles.push(new Particle(this.x,this.y,rand(-100,100),rand(-100,100),rand(0.4,1),'#ff4400',rand(3,6))); }
            sfxExplosion();
            setTimeout(() => this.reset(), 5000);
        }
        reset() {
            this.alive = true; this.hp = this.maxHp;
            this.x = this.spawnX; this.y = this.spawnY;
            this.angle = rand(0, 2*Math.PI); this.speed = 0; this.team = null;
            this.seats[0] = null; this.seats[1] = null; this.stuckTimer = 0;
        }
        update(dt, buildings, walls, players, allCars) {
            if (!this.alive) return;
            const driver = this.seats[0];
            if (driver) {
                let moveInput = 0, turnInput = 0;
                if (driver.isHuman) {
                    if (keys['w'] || keys['arrowup']) moveInput += 1;
                    if (keys['s'] || keys['arrowdown']) moveInput -= 1;
                    if (keys['a'] || keys['arrowleft']) turnInput -= 1;
                    if (keys['d'] || keys['arrowright']) turnInput += 1;
                } else {
                    if (driver.aiTarget && driver.aiState === 'combat') {
                        const targetAngle = angleBetween(this, driver.aiTarget);
                        let diff = targetAngle - this.angle;
                        while (diff > Math.PI) diff -= 2*Math.PI;
                        while (diff < -Math.PI) diff += 2*Math.PI;
                        turnInput = clamp(diff * 2, -1, 1); moveInput = 1;
                    } else if (driver.aiWanderTarget) {
                        const targetAngle = angleBetween(this, driver.aiWanderTarget);
                        let diff = targetAngle - this.angle;
                        while (diff > Math.PI) diff -= 2*Math.PI;
                        while (diff < -Math.PI) diff += 2*Math.PI;
                        turnInput = clamp(diff * 2, -1, 1); moveInput = 0.5;
                    }
                    const rayDist = 80, rayAngles = [-Math.PI/4, -Math.PI/8, 0, Math.PI/8, Math.PI/4];
                    let avoidX = 0, avoidY = 0, minFrontDist = rayDist;
                    for (const angleOffset of rayAngles) {
                        const rayAngle = this.angle + angleOffset;
                        const rayX = this.x + Math.cos(rayAngle) * rayDist, rayY = this.y + Math.sin(rayAngle) * rayDist;
                        let closestDist = rayDist, obstaclePos = null;
                        for (const b of buildings) {
                            if (!b.alive || b.hp >= 9999) continue;
                            if (rectCircleCollision(b.x, b.y, b.w, b.h, rayX, rayY, 8)) {
                                const cx = clamp(this.x, b.x, b.x + b.w), cy = clamp(this.y, b.y, b.y + b.h);
                                const d = dist(this, {x: cx, y: cy});
                                if (d < closestDist) { closestDist = d; obstaclePos = {x: cx, y: cy}; }
                            }
                        }
                        for (const w of walls) {
                            if (!w.alive) continue;
                            if (pointToSegmentDist(rayX, rayY, w.x1, w.y1, w.x2, w.y2) < 15) {
                                const midX = (w.x1 + w.x2)/2, midY = (w.y1 + w.y2)/2;
                                const d = dist(this, {x: midX, y: midY});
                                if (d < closestDist) { closestDist = d; obstaclePos = {x: midX, y: midY}; }
                            }
                        }
                        for (const otherCar of allCars) {
                            if (otherCar === this || !otherCar.alive) continue;
                            if (rectCircleCollision(otherCar.x-otherCar.w/2, otherCar.y-otherCar.h/2, otherCar.w, otherCar.h, rayX, rayY, 12)) {
                                const d = dist(this, otherCar);
                                if (d < closestDist) { closestDist = d; obstaclePos = {x: otherCar.x, y: otherCar.y}; }
                            }
                        }
                        if (obstaclePos && closestDist < rayDist) {
                            const awayX = this.x - obstaclePos.x, awayY = this.y - obstaclePos.y;
                            const len = Math.sqrt(awayX*awayX + awayY*awayY) || 1;
                            const weight = (rayDist - closestDist) / rayDist;
                            avoidX += (awayX / len) * weight; avoidY += (awayY / len) * weight;
                            if (closestDist < minFrontDist) minFrontDist = closestDist;
                        }
                    }
                    if (avoidX !== 0 || avoidY !== 0) {
                        const avoidAngle = Math.atan2(avoidY, avoidX);
                        let angleDiff = avoidAngle - this.angle;
                        while (angleDiff > Math.PI) angleDiff -= 2*Math.PI;
                        while (angleDiff < -Math.PI) angleDiff += 2*Math.PI;
                        const avoidStrength = clamp((rayDist - minFrontDist) / rayDist, 0.2, 1);
                        turnInput = turnInput * (1 - avoidStrength * 0.7) + angleDiff * avoidStrength * 3;
                        if (minFrontDist < 40) moveInput *= 0.2; else if (minFrontDist < 70) moveInput *= 0.6;
                    }
                }
                this.angle += turnInput * this.turnSpeed * dt;
                this.speed += moveInput * this.acceleration * dt;
                this.speed = clamp(this.speed, -this.maxSpeed*0.5, this.maxSpeed);
                let newX = this.x + Math.cos(this.angle) * this.speed * dt;
                let newY = this.y + Math.sin(this.angle) * this.speed * dt;
                const carRect = { x: newX - this.w/2, y: newY - this.h/2, w: this.w, h: this.h };
                let collides = false;
                for (const b of buildings) {
                    if (!b.alive) continue;
                    if (b.isEnterable) {
                        for (const w of b.walls) {
                            if (rectRectCollision(carRect.x, carRect.y, carRect.w, carRect.h, w.x, w.y, w.w, w.h)) {
                                collides = true;
                                if (b.hp < 9999) b.takeDamage(CAR_RAM_DAMAGE_BUILDING * dt, driver.id, driver.team);
                                break;
                            }
                        }
                    } else {
                        if (rectRectCollision(carRect.x, carRect.y, carRect.w, carRect.h, b.x, b.y, b.w, b.h)) {
                            if (b.hp >= 9999) { this.x = MAP_W/2+rand(-50,50); this.y = MAP_H/2+rand(-50,50); this.speed=0; return; }
                            collides = true;
                            b.takeDamage(CAR_RAM_DAMAGE_BUILDING * dt, driver.id, driver.team);
                            break;
                        }
                    }
                    if (collides) break;
                }
                if (!collides) {
                    for (const w of walls) {
                        if (w.alive && pointToSegmentDist(newX, newY, w.x1, w.y1, w.x2, w.y2) < Math.max(this.w, this.h)/2 + w.thickness) {
                            collides = true; w.takeDamage(CAR_RAM_DAMAGE_WALL * dt); break;
                        }
                    }
                }
                if (collides) {
                    const backAngle = this.angle + Math.PI; let tries = 0;
                    while (collides && tries < 50) {
                        newX += Math.cos(backAngle)*2; newY += Math.sin(backAngle)*2;
                        carRect.x = newX - this.w/2; carRect.y = newY - this.h/2;
                        collides = false;
                        for (const b of buildings) {
                            if (!b.alive) continue;
                            if (b.isEnterable) {
                                for (const w of b.walls) if (rectRectCollision(carRect.x,carRect.y,carRect.w,carRect.h, w.x,w.y,w.w,w.h)) { collides=true; break; }
                            } else if (rectRectCollision(carRect.x,carRect.y,carRect.w,carRect.h, b.x,b.y,b.w,b.h)) {
                                if (b.hp >= 9999) { this.x=MAP_W/2+rand(-50,50); this.y=MAP_H/2+rand(-50,50); this.speed=0; return; }
                                collides=true; break;
                            }
                            if (collides) break;
                        }
                        if (!collides) for (const w of walls) if (w.alive && pointToSegmentDist(newX,newY,w.x1,w.y1,w.x2,w.y2) < Math.max(this.w,this.h)/2 + w.thickness) { collides=true; break; }
                        tries++;
                    }
                    this.speed = 0;
                }
                this.x = clamp(newX, this.w/2, MAP_W - this.w/2);
                this.y = clamp(newY, this.h/2, MAP_H - this.h/2);
                for (const otherCar of allCars) {
                    if (otherCar === this || !otherCar.alive) continue;
                    if (rectRectCollision(this.x-this.w/2,this.y-this.h/2,this.w,this.h, otherCar.x-otherCar.w/2,otherCar.y-otherCar.h/2,otherCar.w,otherCar.h)) {
                        const dx=this.x-otherCar.x, dy=this.y-otherCar.y, distCars=Math.sqrt(dx*dx+dy*dy)||1;
                        const overlap=(this.w+otherCar.w)/2+(this.h+otherCar.h)/4 - distCars;
                        if(overlap>0){ const pushX=(dx/distCars)*overlap*0.6, pushY=(dy/distCars)*overlap*0.6; this.x+=pushX; this.y+=pushY; otherCar.x-=pushX; otherCar.y-=pushY; this.speed*=0.4; otherCar.speed*=0.4; }
                    }
                }
                if (!driver.isHuman && Math.abs(this.speed) < 5) {
                    this.stuckTimer += dt; if (this.stuckTimer > 5) { driver.exitCar(); this.stuckTimer = 0; }
                } else this.stuckTimer = 0;
                for (const p of players) {
                    if (!p.alive || p.inCar) continue;
                    if (p.hasEnemyFlag) continue; // flag carrier immune
                    if (rectCircleCollision(this.x-this.w/2, this.y-this.h/2, this.w, this.h, p.x, p.y, p.radius)) {
                        p.takeDamage(35, driver.id, driver.team, 'car');
                        const angle = angleBetween(this, p);
                        p.x += Math.cos(angle)*4; p.y += Math.sin(angle)*4; this.speed *= 0.8;
                    }
                }
                for (let i=0; i<2; i++) {
                    const p = this.seats[i];
                    if (p) {
                        const offset = i===0 ? this.w/2-8 : -(this.w/2-8);
                        p.x = this.x + Math.cos(this.angle)*offset; p.y = this.y + Math.sin(this.angle)*offset;
                        p.angle = this.angle;
                    }
                }
                if (!driver.isHuman && driver.aiTarget && driver.aiState === 'combat' && driver.slotCooldown[driver.currentSlot] <= 0 && !driver.slotReloading[driver.currentSlot]) {
                    driver.shoot(driver.aiTarget.x, driver.aiTarget.y, walls, allCars);
                }
            } else { this.speed *= 0.9; this.stuckTimer = 0; }
        }
        draw(ctx, cam) {
            if (!this.alive) return;
            const sx = this.x - cam.x, sy = this.y - cam.y;
            ctx.save(); ctx.translate(sx, sy); ctx.rotate(this.angle);

    class Bullet {
        constructor(x,y,vx,vy,damage,range,color,size,shooterId,team,isPellet=false){ this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.damage=damage;this.range=range;this.maxRange=range;this.color=color;this.size=size;this.shooterId=shooterId;this.team=team;this.trail=[];this.isPellet=isPellet; }
        update(dt, cars, walls){
            this.trail.push({x:this.x,y:this.y,life:0.15}); if(this.trail.length>12) this.trail.shift(); for(const t of this.trail) t.life-=dt;
            const speed=Math.sqrt(this.vx**2+this.vy**2), dx=(this.vx/speed)*speed*dt, dy=(this.vy/speed)*speed*dt;
            this.x+=dx; this.y+=dy; this.range-=Math.sqrt(dx**2+dy**2);
            for(const c of cars) if(c.alive&&rectCircleCollision(c.x-c.w/2,c.y-c.h/2,c.w,c.h,this.x,this.y,this.size)){
                c.takeDamage(this.damage * 0.1);
                return false;
            }
            for(const w of walls) if(w.alive&&pointToSegmentDist(this.x,this.y,w.x1,w.y1,w.x2,w.y2)<this.size+w.thickness){ w.takeDamage(this.damage*0.5); return false; }
            for(const b of buildings) if(b.alive){ if(b.isEnterable){ for(const w of b.walls) if(rectCircleCollision(w.x,w.y,w.w,w.h,this.x,this.y,this.size)){ b.takeDamage(this.damage*0.5,this.shooterId,this.team); return false; } } else if(rectCircleCollision(b.x,b.y,b.w,b.h,this.x,this.y,this.size)){ b.takeDamage(this.damage*0.5,this.shooterId,this.team); return false; } }

    class ExplosiveProjectile {
        constructor(x,y,vx,vy,def,throwerId,team){ this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.def=def;this.throwerId=throwerId;this.team=team; this.fuse=def.fuse;this.stuck=false;this.stuckTo=null;this.alive=true; this.proximity=def.proximity||false;this.armed=false; }
        update(dt){
            if(this.stuck){
                if(this.stuckTo&&this.stuckTo.alive){ this.x=this.stuckTo.x; this.y=this.stuckTo.y; }
                if(this.proximity){ if(!this.armed){ this.fuse-=dt; if(this.fuse<=0) this.armed=true; } else if(this.armed){ for(const c of cars) if(c.alive&&dist(this,c)<this.def.radius){ this.explode(); return; } } return; }
                this.fuse-=dt; if(this.fuse<=0){ this.explode(); return; }
            } else {
                this.x+=this.vx*dt; this.y+=this.vy*dt; this.fuse-=dt;
                if(this.def.explodeOnImpact){ for(const b of buildings) if(b.alive){ if(b.isEnterable){ for(const w of b.walls) if(rectCircleCollision(w.x,w.y,w.w,w.h,this.x,this.y,6)){ this.explode(); return; } } else if(rectCircleCollision(b.x,b.y,b.w,b.h,this.x,this.y,6)){ this.explode(); return; } } for(const p of players) if(p.hp>0&&p.id!==this.throwerId&&dist(this,p)<20){ this.explode(); return; } }
                if(this.fuse<=0){ this.explode(); return; }
                if(this.def.sticky&&this.fuse<this.def.fuse*0.7){ for(const c of cars) if(c.alive&&rectCircleCollision(c.x-c.w/2,c.y-c.h/2,c.w,c.h,this.x,this.y,8)){ this.stuck=true; this.stuckTo=c; break; } for(const b of buildings) if(b.alive){ if(b.isEnterable){ for(const w of b.walls) if(rectCircleCollision(w.x,w.y,w.w,w.h,this.x,this.y,8)){ this.stuck=true; this.stuckTo=b; break; } } else if(rectCircleCollision(b.x,b.y,b.w,b.h,this.x,this.y,8)){ this.stuck=true; this.stuckTo=b; break; } } }
            }
        }
        explode(){
            this.alive=false; const r=this.def.radius, dmg=this.def.damage, carDmg=this.def.carDamage||0;
            for(const p of players) if(p.hp>0){ const d=dist(p,this); if(d<r){ if(p.team===this.team) p.hp=Math.min(p.maxHp,p.hp+dmg*(1-d/r)); else p.takeDamage(dmg*(1-d/r),this.throwerId,this.team,'explosion'); } }
            for(const b of buildings) if(b.alive){ if(b.isEnterable){ let td=0; for(const w of b.walls){ const cx=clamp(this.x,w.x,w.x+w.w),cy=clamp(this.y,w.y,w.y+w.h); const d=dist({x:cx,y:cy},{x:this.x,y:this.y}); if(d<r) td=Math.max(td,dmg*(1-d/r)); } if(td>0) b.takeDamage(td,this.throwerId,this.team); } else { const cx=clamp(this.x,b.x,b.x+b.w),cy=clamp(this.y,b.y,b.y+b.h); const d=dist({x:cx,y:cy},{x:this.x,y:this.y}); if(d<r) b.takeDamage(dmg*(1-d/r),this.throwerId,this.team); } }
            for(const c of cars) if(c.alive&&carDmg>0&&dist(this,c)<r) c.takeDamage(carDmg);
            for(let i=0;i<40;i++){ const a=Math.random()*Math.PI*2,s=rand(100,400); particles.push(new Particle(this.x,this.y,Math.cos(a)*s,Math.sin(a)*s,rand(0.3,0.9),choice(['#ff4400','#ff8800','#ffcc00','#ff0000','#333']),rand(2,6))); }
            if(this.def.name==='Molotov') smokeClouds.push({x:this.x,y:this.y,radius:this.def.radius,life:this.def.fireDuration||3,maxLife:this.def.fireDuration||3,dps:this.def.fireDPS||30,team:this.team,throwerId:this.throwerId});

        }
        get dead(){ return !this.alive; }
    }

    class Player {

            } else if(isCommander) this.randomizeWeapons();

            if(this.isShieldBot) return;
            const primaries = ['Sniper','Rifle','SMG'];
            let secondaries = ['Pistol','Shotgun','MachinePistol'];
            const p = choice(primaries);
            if(p === 'SMG') secondaries = secondaries.filter(s => s !== 'MachinePistol');
            else if(p === 'MachinePistol') secondaries = secondaries.filter(s => s !== 'SMG');
            const s = choice(secondaries);

                            victimName, victimTeam: this.team,

                        });

                        const killerName = killer.isHuman ? 'You' : TEAM_NAMES[killer.team] + ' Bot';

                        killFeed.push({

                            victimName, victimTeam: this.team,
                            deathVerb: verb, deathType,
                            isTeamkill: true, streakLevel: 0,
                            timer: 3
                        });
                    }
                    if(killFeed.length > 5) killFeed.shift();
                }
            } else {
                const victimName = this.isHuman ? 'You' : TEAM_NAMES[this.team] + ' Bot';
                killFeed.push({
                    killerName: null, killerTeam: null,
                    victimName, victimTeam: this.team,
                    deathVerb: null, deathType,
                    isTeamkill: false, streakLevel: 0,

                });

            if(this.isHuman) showRespawnScreen=true; this.exitCar();

        update(dt,walls,allPlayers){

            for(const w of walls) if(w.alive&&pointToSegmentDist(this.x,this.y,w.x1,w.y1,w.x2,w.y2)<this.radius+w.thickness){ const dx=this.x-(w.x1+w.x2)/2, dy=this.y-(w.y1+w.y2)/2, ang=Math.atan2(dy,dx); this.x+=Math.cos(ang)*(this.radius+w.thickness-dist(this,{x:(w.x1+w.x2)/2,y:(w.y1+w.y2)/2})); this.y+=Math.sin(ang)*(this.radius+w.thickness-dist(this,{x:(w.x1+w.x2)/2,y:(w.y1+w.y2)/2})); }
            for(const b of buildings){ if(!b.alive||b.hp>=9999) continue; if(b.isEnterable){ for(const w of b.walls){ const cx=clamp(this.x,w.x,w.x+w.w), cy=clamp(this.y,w.y,w.y+w.h); const d=dist({x:cx,y:cy},{x:this.x,y:this.y}); if(d<this.radius){ const overlap=this.radius-d, ang=angleBetween({x:cx,y:cy},this); this.x+=Math.cos(ang)*overlap; this.y+=Math.sin(ang)*overlap; } } } else { const cx=clamp(this.x,b.x,b.x+b.w), cy=clamp(this.y,b.y,b.y+b.h); const d=dist({x:cx,y:cy},{x:this.x,y:this.y}); if(d<this.radius){ const overlap=this.radius-d, ang=angleBetween({x:cx,y:cy},this); this.x+=Math.cos(ang)*overlap; this.y+=Math.sin(ang)*overlap; } } }
            for(const cloud of smokeClouds){ if(dist(this,cloud)<cloud.radius&&cloud.throwerId!==this.id){ if(this.team===cloud.team) this.hp=Math.min(this.maxHp,this.hp+cloud.dps*dt); else this.takeDamage(cloud.dps*dt,cloud.throwerId,cloud.team,'fire'); } }

        shoot(worldMX,worldMY,walls,cars){

                for(const w of walls){ if(!w.alive) continue; const dx=w.x2-w.x1,dy=w.y2-w.y1,lenSq=dx*dx+dy*dy; let t=0; if(lenSq>0) t=clamp(((this.x-w.x1)*dx+(this.y-w.y1)*dy)/lenSq,0,1); const cx=w.x1+t*dx,cy=w.y1+t*dy,d=dist(this,{x:cx,y:cy}); if(d<range+10){ const angTo=angleBetween(this,{x:cx,y:cy}); let diff=Math.abs(angTo-this.meleeAngle); if(diff>Math.PI) diff=Math.PI*2-diff; if(diff<arc) w.takeDamage(def.damage*3); } }

                if(this.slotAmmo[slot]<=0) return;

    // ---------- INITIALIZATION ----------
    function initCars(){
        cars = [];
        for (let i = 0; i < 2; i++) {
            const x = rand(60, MAP_W/3 - 60);
            const y = rand(60, MAP_H - 60);
            cars.push(new Car(x, y, i, rand(0, 2*Math.PI)));
        }
        for (let i = 2; i < 4; i++) {
            const x = rand(2*MAP_W/3 + 60, MAP_W - 60);
            const y = rand(60, MAP_H - 60);
            cars.push(new Car(x, y, i, rand(0, 2*Math.PI)));
        }
    }
    function generateMap(){
        buildings=[]; const placed=[]; const ss=[{w:80,h:60},{w:90,h:65},{w:70,h:75},{w:95,h:55},{w:65,h:80}];
        for(const s of ss){ let bx,by,overlap,a=0; do{ bx=rand(20,MAP_W-s.w-20); by=rand(20,MAP_H-s.h-20); overlap=false; for(const p of placed) if(rectRectCollision(bx-15,by-15,s.w+30,s.h+30,p.x,p.y,p.w,p.h)){ overlap=true; break; } for(const z of SPAWN_ZONES) if(rectRectCollision(bx,by,s.w,s.h,z.x,z.y,z.w,z.h)){ overlap=true; break; } a++; } while(overlap&&a<30); if(!overlap){ buildings.push(new Building(bx,by,s.w,s.h,rand(200,300),choice(['#6b705c','#7f7f7f','#8a817c']))); placed.push({x:bx,y:by,w:s.w,h:s.h}); } }
        for(let i=0;i<12;i++){ const w=rand(15,30),h=rand(15,30),bx=rand(15,MAP_W-w-15),by=rand(15,MAP_H-h-15); let overlap=false; for(const p of placed) if(rectRectCollision(bx-8,by-8,w+16,h+16,p.x,p.y,p.w,p.h)){ overlap=true; break; } for(const z of SPAWN_ZONES) if(rectRectCollision(bx,by,w,h,z.x-3,z.y-3,z.w+6,z.h+6)){ overlap=true; break; } if(!overlap){ buildings.push(new Building(bx,by,w,h,rand(50,100),choice(['#a68a64','#936639','#b08968']))); placed.push({x:bx,y:by,w,h}); } }
        for(let i=0;i<3;i++){ const w=rand(70,100),h=rand(50,75),bx=rand(35,MAP_W-w-35),by=rand(35,MAP_H-h-35); let overlap=false; for(const p of placed) if(rectRectCollision(bx-12,by-12,w+24,h+24,p.x,p.y,p.w,p.h)){ overlap=true; break; } for(const z of SPAWN_ZONES) if(rectRectCollision(bx,by,w,h,z.x-3,z.y-3,z.w+6,z.h+6)){ overlap=true; break; } if(!overlap){ buildings.push(new Building(bx,by,w,h,180,choice(['#8a7a6a','#7a6b5c']),true)); placed.push({x:bx,y:by,w:h}); } }
        buildings.push(new Building(0,0,MAP_W,10,99999,'#222')); buildings.push(new Building(0,MAP_H-10,MAP_W,10,99999,'#222'));
        buildings.push(new Building(0,0,10,MAP_H,99999,'#222')); buildings.push(new Building(MAP_W-10,0,10,MAP_H,99999,'#222'));
    }
    function initPlayers(){
        players=[]; playerTeam=randInt(0,NUM_TEAMS-1); let id=0;
        const slots=[];
        for(let t=0;t<NUM_TEAMS;t++){
            for(let p=0;p<8;p++) slots.push({team:t,isShield:false,isCommander:false});
            slots.push({team:t,isShield:true,isCommander:false});
            slots.push({team:t,isShield:false,isCommander:true});
        }
        for(let i=slots.length-1;i>0;i--){ const j=randInt(0,i); [slots[i],slots[j]]=[slots[j],slots[i]]; }
        let assigned=false;
        for(const info of slots){
            const isHuman=!assigned&&!info.isShield&&!info.isCommander&&info.team===playerTeam;
            if(isHuman) assigned=true;
            const p=new Player(id,info.team,isHuman,info.isShield,info.isCommander);
            players.push(p); if(isHuman) player=p; id++;
        }
        if(!player){ const rp=players.find(p=>p.team===playerTeam&&!p.isHuman&&!p.isShieldBot&&!p.isCommander); if(rp){ rp.isHuman=true; rp.speed=800; player=rp; } }
        for(let t=0;t<NUM_TEAMS;t++){
            const reg=players.filter(p=>p.team===t&&!p.isHuman&&!p.isShieldBot&&!p.isCommander);
            for(let i=0;i<reg.length;i++) reg[i].followsCommander = i < Math.floor(reg.length/2);
        }
    }

    function findBlockingObstacle(bot,target,buildings,walls){
        let minDist=Infinity,closest=null;
        for(const b of buildings){ if(!b.alive||b.hp>=9999) continue; if(lineRectIntersection(bot.x,bot.y,target.x,target.y,b.x,b.y,b.w,b.h)){ const d=dist(bot,{x:b.x+b.w/2,y:b.y+b.h/2}); if(d<minDist){ minDist=d; closest={x:b.x+b.w/2,y:b.y+b.h/2}; } } }
        for(const w of walls){ if(!w.alive) continue; if(pointToSegmentDist(target.x,target.y,w.x1,w.y1,w.x2,w.y2)<15||pointToSegmentDist(bot.x,bot.y,w.x1,w.y1,w.x2,w.y2)<15){ const mx=(w.x1+w.x2)/2,my=(w.y1+w.y2)/2,d=dist(bot,{x:mx,y:my}); if(d<minDist){ minDist=d; closest={x:mx,y:my}; } } }
        return closest;
    }

    function isInWeaponRange(bot, target) {
        const slot = bot.currentSlot;
        if(slot === 2) {
            const def = bot.slots[2];
            return def && dist(bot, target) <= (bot.hasEnemyFlag ? def.range*3 : def.range);
        } else if(slot <= 1) {
            const def = bot.slots[slot];
            return def && dist(bot, target) <= def.range;
        }
        return false;
    }

    function updateAI(dt,walls,cars){
        for(let t=0;t<NUM_TEAMS;t++){
            const commander=players.find(p=>p.team===t&&p.isCommander&&p.alive);
            if(commander&&!playerRallyPoint){
                if(commander.nextRallyUpdate<=0){
                    let enemyNearby=false;
                    for(const p of players){ if(p.team!==t&&p.alive&&!p.isShieldBot&&dist(commander,p)<500){ enemyNearby=true; break; } }
                    if(enemyNearby){
                        let ax=0,ay=0,cnt=0;
                        for(const p of players) if(p.team!==t&&p.alive&&!p.isShieldBot&&dist(commander,p)<250){ ax+=p.x; ay+=p.y; cnt++; }
                        if(cnt>0){ ax/=cnt; ay/=cnt; teamRallyPoints[t]={x:ax,y:clamp(ay,50,MAP_H-50)}; commander.nextRallyUpdate=5; }
                    } else teamRallyPoints[t]=null;
                } else commander.nextRallyUpdate-=dt;
                if(!teamRallyPoints[t]) commander.aiWanderTarget={x:MAP_W/2+rand(-150,150),y:MAP_H/2+rand(-100,100)};
            }
        }
        for(const bot of players){
            if(bot.isHuman||!bot.alive) continue;
            if(bot.stunned>0){ bot.vx*=0.5; bot.vy*=0.5; continue; }
            let nearestEnemy=null,nearestDist=bot.aiVisionRange;
            for(const p of players){ if(p.id===bot.id||p.hp<=0||p.team===bot.team) continue; const d=dist(bot,p); if(d<nearestDist&&lineOfSightClear(bot.x,bot.y,p.x,p.y,buildings,walls)){ nearestDist=d; nearestEnemy=p; } }
            if(nearestEnemy && !bot.isShieldBot && nearestEnemy.isShieldBot) nearestEnemy = null;
            if(nearestEnemy){
                if(nearestEnemy.isShieldBot && !bot.isShieldBot){
                    bot.retreatTimer=5; bot.aiTarget=null; bot.aiState='retreat';
                } else {
                    if(bot.isShieldBot){
                        bot.switchSlot(4);
                        if(dist(bot,nearestEnemy)<70) bot.switchSlot(2);
                    } else {
                        if(dist(bot,nearestEnemy)>350) for(let i=0;i<=1;i++) if(bot.slots[i]&&bot.slots[i].name==='Sniper') bot.switchSlot(i);
                        else if(dist(bot,nearestEnemy)<150) for(let i=0;i<=1;i++) if(bot.slots[i]&&bot.slots[i].name==='Shotgun') bot.switchSlot(i);
                    }
                    bot.aiTarget=nearestEnemy; bot.aiState='combat'; bot.patrolTarget=null;
                }
            } else {
                let followRally=null;
                if(bot.team===playerTeam&&playerRallyPoint) followRally=playerRallyPoint;
                else if(bot.followsCommander&&teamRallyPoints[bot.team]) followRally=teamRallyPoints[bot.team];
                if(bot.retreatTimer>0){ bot.aiState='retreat'; if(!bot.aiWanderTarget) bot.aiWanderTarget={x:bot.x+rand(-200,200),y:bot.y+rand(-150,150)}; }
                else if(followRally&&!bot.inCar){
                    if(dist(bot,followRally)<=30){
                        if(!bot.patrolTarget||bot.patrolTimer<=0){
                            const angle=rand(0,2*Math.PI), dist=rand(35,70);
                            bot.patrolTarget={x:followRally.x+Math.cos(angle)*dist, y:followRally.y+Math.sin(angle)*dist};
                            bot.patrolTimer=rand(2,4);
                        }
                        bot.aiWanderTarget=bot.patrolTarget; bot.aiState='wander'; bot.angle=angleBetween(bot,bot.aiWanderTarget); bot.patrolTimer-=dt;
                    } else {
                        const blocking=findBlockingObstacle(bot,followRally,buildings,walls);
                        if(blocking){ bot.aiTarget=blocking; bot.aiState='combat'; if(bot.slots[2]&&bot.slotCooldown[2]<=0) bot.switchSlot(2); else if(bot.slots[0]&&bot.slotAmmo[0]>0&&!bot.slotReloading[0]) bot.switchSlot(0); }
                        else { bot.aiWanderTarget=followRally; bot.aiState='wander'; bot.angle=angleBetween(bot,followRally); bot.patrolTarget=null; }
                    }
                } else if(bot.isCommander&&!followRally&&bot.aiState==='wander'&&!bot.aiTarget){ bot.aiWanderTarget={x:MAP_W/2+rand(-150,150),y:MAP_H/2+rand(-100,100)}; }
            }
            if(bot.inCar) continue;
            if(bot.aiState==='combat'&&bot.aiTarget){
                if(bot.aiTarget.isShieldBot && !bot.isShieldBot){ bot.retreatTimer=5; bot.aiTarget=null; bot.aiState='retreat'; }
                else {
                    bot.aiAttackTimer-=dt; const tAngle=angleBetween(bot,bot.aiTarget); bot.angle=tAngle;
                    const idealDist=bot.slots[0]&&bot.slots[0].range?bot.slots[0].range*0.6:250;
                    if(dist(bot,bot.aiTarget)>idealDist){ bot.vx+=Math.cos(tAngle)*bot.speed*0.5*dt; bot.vy+=Math.sin(tAngle)*bot.speed*0.5*dt; }
                    else if(dist(bot,bot.aiTarget)<idealDist*0.4){ bot.vx-=Math.cos(tAngle)*bot.speed*0.4*dt; bot.vy-=Math.sin(tAngle)*bot.speed*0.4*dt; }
                    else { const strafe=tAngle+Math.PI/2*(Math.sin(bot.aiWanderTimer*3)>0?1:-1); bot.vx+=Math.cos(strafe)*bot.speed*0.3*dt; bot.vy+=Math.sin(strafe)*bot.speed*0.3*dt; }
                    if(bot.hp<bot.maxHp*0.5&&bot.slotCooldown[4]<=0&&!bot.slotReloading[4]&&bot.currentSlot!==4&&Math.random()<0.02) bot.switchSlot(4);
                    if(bot.currentSlot===4&&bot.slotCooldown[4]<=0){ const wx=bot.x+Math.cos(bot.angle)*40,wy=bot.y+Math.sin(bot.angle)*40; bot.shoot(wx,wy,walls,cars); setTimeout(()=>{if(bot.alive&&bot.currentSlot===4)bot.switchSlot(0)},400); }
                    else if(bot.currentSlot!==4){
                        if(dist(bot,bot.aiTarget)<70&&bot.slots[2]){ if(bot.currentSlot!==2&&bot.slotCooldown[2]<=0) bot.switchSlot(2); }
                        else if(bot.isShieldBot){ bot.switchSlot(4); }
                        else {
                            if(dist(bot,bot.aiTarget)<200&&bot.slots[1]&&bot.slots[1].name==='SMG'){ if(bot.currentSlot!==1&&bot.slotCooldown[1]<=0) bot.switchSlot(1); }
                            else if(dist(bot,bot.aiTarget)>350&&bot.slots[0]&&bot.slots[0].name==='Sniper'){ if(bot.currentSlot!==0&&bot.slotCooldown[0]<=0) bot.switchSlot(0); }
                            else if(bot.currentSlot>1&&bot.slotCooldown[0]<=0) bot.switchSlot(0);
                        }
                        if(bot.slotAmmo[3]>0&&bot.slotCooldown[3]<=0&&Math.random()<0.005&&bot.explosiveLocked<=0){ let grp=0,cx=0,cy=0; for(const p of players) if(p.alive&&p.team!==bot.team&&!p.isShieldBot&&dist(bot,p)<250){ grp++; cx+=p.x; cy+=p.y; } if(grp>=2){ cx/=grp; cy/=grp; bot.switchSlot(3); bot.shoot(cx,cy,walls,cars); bot.switchSlot(0); } }
                        if(bot.aiAttackTimer<=0&&bot.slotCooldown[bot.currentSlot]<=0&&!bot.slotReloading[bot.currentSlot] && isInWeaponRange(bot, bot.aiTarget)){
                            bot.shoot(bot.aiTarget.x+rand(-20,20),bot.aiTarget.y+rand(-20,20),walls,cars); bot.aiAttackTimer=rand(0.8,1.6);
                        }
                        if(bot.currentSlot<=1&&bot.slotAmmo[bot.currentSlot]<=0&&!bot.slotReloading[bot.currentSlot]) bot.startReload(bot.currentSlot);
                    }
                }
            } else if(bot.aiState==='retreat'){ if(bot.aiWanderTarget){ const wa=angleBetween(bot,bot.aiWanderTarget); bot.vx+=Math.cos(wa)*bot.speed*0.6*dt; bot.vy+=Math.sin(wa)*bot.speed*0.6*dt; bot.angle=wa; } }
            else {
                if (!bot.hasEnemyFlag) {
                    const enemyFlag = flags[1 - bot.team];
                    bot.aiWanderTarget = { x: enemyFlag.x, y: enemyFlag.y };
                } else {
                    const zone = SPAWN_ZONES[bot.team];
                    bot.aiWanderTarget = { x: zone.x + zone.w/2, y: zone.y + zone.h/2 };
                }
                bot.aiWanderTimer=rand(0.5,1); bot.angle=angleBetween(bot,bot.aiWanderTarget);
                bot.vx+=Math.cos(bot.angle)*bot.speed*0.5*dt; bot.vy+=Math.sin(bot.angle)*bot.speed*0.5*dt;
            }
            if (!bot.hasEnemyFlag && !bot.inCar) {
                const enemyFlag = flags[1 - bot.team];
                if (enemyFlag.carrier === null && dist(bot, enemyFlag) < 40) {
                    enemyFlag.pickUp(bot); sfxFlagPickup();
                }
            }
            if (!bot.hasEnemyFlag && !bot.inCar && Math.random()<0.01){ 
                const nc=cars.find(c=>c.alive&&(c.team===null||c.team===bot.team)&&(c.seats[0]==null||c.seats[1]==null)&&dist(bot,c)<50); 
                if(nc){ const seat=nc.seats[0]==null?0:(nc.seats[1]==null?1:-1); if(seat!==-1) bot.enterCar(nc,seat); } 
            }
            const spd=Math.sqrt(bot.vx**2+bot.vy**2); if(spd>bot.speed){ bot.vx=(bot.vx/spd)*bot.speed; bot.vy=(bot.vy/spd)*bot.speed; }
        }
    }

    let lastTime=performance.now();
    function update(dt){
        if(gameOver||homeScreen) return;
        dt=Math.min(dt,0.1); gameTime-=dt;
        if(gameTime<=0){ gameTime=0; gameOver=true; endGame(); }
        if(player&&player.alive&&!showRespawnScreen){
            if(!player.inCar){
                let mx=0,my=0;
                if(keys['w']||keys['arrowup']) my-=1; if(keys['s']||keys['arrowdown']) my+=1;
                if(keys['a']||keys['arrowleft']) mx-=1; if(keys['d']||keys['arrowright']) mx+=1;
                if(mx||my){ const len=Math.sqrt(mx*mx+my*my); mx/=len; my/=len; player.vx+=mx*player.speed*0.85*dt; player.vy+=my*player.speed*0.85*dt; const spd=Math.sqrt(player.vx**2+player.vy**2); if(spd>player.speed){ player.vx=(player.vx/spd)*player.speed; player.vy=(player.vy/spd)*player.speed; } }
                player.angle=angleBetween(player,{x:mouseWorldX,y:mouseWorldY});
                if(mouseDown&&player.slotCooldown[player.currentSlot]<=0&&!player.slotReloading[player.currentSlot]&&!player.meleeActive){
                    if(player.currentSlot<=2) player.shoot(mouseWorldX,mouseWorldY,walls,cars);
                    else if(player.currentSlot>=3&&mouseClicked){ player.shoot(mouseWorldX,mouseWorldY,walls,cars); mouseClicked=false; }
                }
                if(keyJustPressed['e']){ 
                    if (!player.hasEnemyFlag) {
                        const nc=cars.find(c=>c.alive&&(c.team===null||c.team===player.team)&&(c.seats[0]==null||c.seats[1]==null)&&dist(player,c)<60); 
                        if(nc){ const seat=nc.seats[0]==null?0:(nc.seats[1]==null?1:-1); if(seat!==-1) player.enterCar(nc,seat); } 
                    }
                }
                if (keyJustPressed['f']) {
                    const enemyFlag = flags[1 - player.team];
                    if (enemyFlag.carrier === null && dist(player, enemyFlag) < 40) {
                        enemyFlag.pickUp(player); sfxFlagPickup();
                    }
                }
                if (keyJustPressed['g'] && player.hasEnemyFlag) {
                    flags[1 - player.team].drop(player.x, player.y);
                    player.hasEnemyFlag = false;
                }
            } else {
                if(keyJustPressed['e']) player.exitCar();
                if(mouseDown&&player.slotCooldown[player.currentSlot]<=0&&!player.slotReloading[player.currentSlot]&&!player.meleeActive){
                    if(player.currentSlot<=2) player.shoot(mouseWorldX,mouseWorldY,walls,cars);
                    else if(player.currentSlot>=3&&mouseClicked){ player.shoot(mouseWorldX,mouseWorldY,walls,cars); mouseClicked=false; }
                }
            }
        }
        // Scoring
        for (const p of players) {
            if (!p.alive || !p.hasEnemyFlag) continue;
            const zone = SPAWN_ZONES[p.team];
            if (p.x > zone.x && p.x < zone.x + zone.w && p.y > zone.y && p.y < zone.y + zone.h) {
                captures[p.team]++;
                flags[1 - p.team].returnToBase();
                p.hasEnemyFlag = false;
                sfxFlagScore();
                if (captures[p.team] >= MAX_CAPTURES) {
                    gameOver = true;
                    winnerTeam = p.team;
                    gameTime = 0;
                }
            }
        }
        for(const bot of players){ if(bot.isHuman||bot.alive) continue; if(!bot._respawnTimer) bot._respawnTimer=rand(3,6); bot._respawnTimer-=dt; if(bot._respawnTimer<=0){ bot.respawn(); bot._respawnTimer=null; } }
        updateAI(dt,walls,cars);
        for(const p of players) if(p.alive) p.update(dt,walls,players);
        for(const c of cars) c.update(dt,buildings,walls,players,cars);
        bullets=bullets.filter(b=>b.update(dt,cars,walls));
        for(const exp of explosives){ if(!exp.dead) exp.update(dt); } explosives=explosives.filter(e=>!e.dead);
        for(const d of disruptorProjectiles) if(!d.dead) d.update(dt); disruptorProjectiles=disruptorProjectiles.filter(d=>!d.dead);
        for(const cloud of smokeClouds) cloud.life-=dt; smokeClouds=smokeClouds.filter(c=>c.life>0);
        for(const p of particles) p.update(dt); particles=particles.filter(p=>!p.dead);
        for(const b of buildings) b.update(dt); buildings=buildings.filter(b=>b.alive);
        for(const w of walls) w.update(dt); walls=walls.filter(w=>w.alive);
        for(let i=destroyedCarRemains.length-1;i>=0;i--){ destroyedCarRemains[i].timer-=dt; if(destroyedCarRemains[i].timer<=0) destroyedCarRemains.splice(i,1); }
        for(let i=killFeed.length-1;i>=0;i--){ killFeed[i].timer-=dt; if(killFeed[i].timer<=0) killFeed.splice(i,1); }
        for(const bullet of bullets){ if(bullet.dead) continue; for(const p of players) if(p.alive&&p.id!==bullet.shooterId&&dist(bullet,p)<p.radius+bullet.size){ if(p.team===bullet.team){ p.hp=Math.min(p.maxHp,p.hp+bullet.damage*0.5); bullet.range=0; } else { p.takeDamage(bullet.damage,bullet.shooterId,bullet.team,'bullet'); bullet.range=0; sfxHit(); break; } } }
        bullets=bullets.filter(b=>!b.dead);
        for (const flag of flags) flag.update(dt);
        if(player&&player.alive){ camera.x=player.x-W/2; camera.y=player.y-H/2; }
        mouseWorldX=mouseX+camera.x; mouseWorldY=mouseY+camera.y; mouseClicked=false; keyJustPressed={};
    }
    function endGame(){ 
        gameOver=true; gameEndTime=performance.now(); 
        if (captures[0] !== captures[1]) winnerTeam = captures[0] > captures[1] ? 0 : 1;
        else winnerTeam = -1;
    }
    function restartGame(){ 
        if(gameOver&&performance.now()-gameEndTime<3000) return; 
        gameTime=GAME_DURATION; gameOver=false; winnerTeam=-1; 
        bullets=[]; particles=[]; explosives=[]; smokeClouds=[]; killFeed=[]; showRespawnScreen=false; 
        buildings=[]; walls=[]; disruptorProjectiles=[]; destroyedCarRemains=[]; 
        cars.forEach(c=>c.reset()); 
        playerRallyPoint=null; teamRallyPoints=[null,null]; 
        captures = [0,0];
        flags.forEach(f => f.returnToBase());
        generateMap(); initPlayers(); 
        if(player){ camera.x=player.x-W/2; camera.y=player.y-H/2; } 
        gameEndTime=0; 
    }

    function drawMinimap(){
        const mmW=200, mmH=133, mmX=15, mmY=15, sx=mmW/MAP_W, sy=mmH/MAP_H;
        ctx.globalAlpha=0.6; ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(mmX-2,mmY-2,mmW+4,mmH+4); ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.strokeRect(mmX-2,mmY-2,mmW+4,mmH+4);
        ctx.fillStyle='#2a2a1a'; ctx.fillRect(mmX,mmY,mmW,mmH);
        for(let t=0;t<NUM_TEAMS;t++){ const z=SPAWN_ZONES[t]; ctx.fillStyle=`${TEAM_COLORS[t]}22`; ctx.fillRect(mmX+z.x*sx,mmY+z.y*sy,z.w*sx,z.h*sy); }
        for(const b of buildings) if(b.alive){ ctx.fillStyle=b.isPlaced?'#4a90e2':(b.isEnterable?'rgba(200,180,150,0.6)':`rgba(150,140,120,${0.5+(b.hp/b.maxHp)*0.4})`); ctx.fillRect(mmX+b.x*sx,mmY+b.y*sy,Math.max(b.w*sx,1.5),Math.max(b.h*sy,1.5)); }
        for(const c of cars) if(c.alive){ ctx.fillStyle='#fff'; ctx.fillRect(mmX+c.x*sx-2,mmY+c.y*sy-1,4,2); }
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
        for (const w of walls) if(w.alive){ ctx.beginPath(); ctx.moveTo(mmX+w.x1*sx,mmY+w.y1*sy); ctx.lineTo(mmX+w.x2*sx,mmY+w.y2*sy); ctx.stroke(); }
        if(playerRallyPoint){ ctx.fillStyle='#ffff00'; ctx.beginPath(); ctx.arc(mmX+playerRallyPoint.x*sx,mmY+playerRallyPoint.y*sy,4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke(); }
        else if(teamRallyPoints[playerTeam]){ const rp=teamRallyPoints[playerTeam]; ctx.fillStyle='#ffff00'; ctx.beginPath(); ctx.arc(mmX+rp.x*sx,mmY+rp.y*sy,4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke(); }
        for(const p of players) if(p.alive){
            if(p.inCar){ ctx.fillStyle='#ffff00'; ctx.beginPath(); ctx.arc(mmX+p.x*sx,mmY+p.y*sy,3.5,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=TEAM_COLORS[p.team]; ctx.lineWidth=1.5; ctx.stroke(); ctx.fillStyle='#000'; ctx.fillRect(mmX+p.x*sx-2,mmY+p.y*sy-1,4,2); }
            else if(p.isShieldBot){ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(mmX+p.x*sx,mmY+p.y*sy,3,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=TEAM_COLORS[p.team]; ctx.lineWidth=1.5; ctx.stroke(); }
            else if(p.isCommander&&p.team===playerTeam){ ctx.fillStyle='#ffaa00'; ctx.beginPath(); ctx.arc(mmX+p.x*sx,mmY+p.y*sy,3.5,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke(); }
            else { ctx.fillStyle=TEAM_COLORS[p.team]; ctx.beginPath(); ctx.arc(mmX+p.x*sx,mmY+p.y*sy,p.isHuman?3.5:2.5,0,Math.PI*2); ctx.fill(); if(p.isHuman){ ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke(); } }
            ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(mmX + p.x*sx, mmY + p.y*sy); ctx.lineTo(mmX + p.x*sx + Math.cos(p.angle)*6, mmY + p.y*sy + Math.sin(p.angle)*6); ctx.stroke();
        }
        for (const flag of flags) {
            ctx.fillStyle = TEAM_COLORS[flag.team]; ctx.beginPath(); ctx.arc(mmX + flag.x*sx, mmY + flag.y*sy, 4, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
        }

    }

    function drawGameOverScreen(){

        else { ctx.fillStyle='#fff'; ctx.font='bold 40px'; ctx.fillText('DRAW!',cx,cy-50); }
        for(let t=0;t<NUM_TEAMS;t++){ ctx.fillStyle=TEAM_COLORS[t]; ctx.font='20px'; ctx.fillText(`${TEAM_NAMES[t]}: ${captures[t]} captures`,cx,cy-10+t*28); }
        const elapsed=performance.now()-gameEndTime; 
        if(elapsed<3000){ ctx.fillStyle='#fff'; ctx.font='18px'; ctx.fillText(`Next round in ${Math.ceil((3000-elapsed)/1000)}s...`,cx,cy+110); }
        else { ctx.fillStyle='#fff'; ctx.font='18px'; ctx.fillText('Click or R to restart',cx,cy+110); }
        const homeBtnW=120,homeBtnH=40,homeBtnX=20,homeBtnY=20; 
        ctx.fillStyle='#e74c3c'; ctx.fillRect(homeBtnX,homeBtnY,homeBtnW,homeBtnH); ctx.fillStyle='#fff'; ctx.font='bold 18px'; ctx.textAlign='center'; ctx.fillText('HOME',homeBtnX+homeBtnW/2,homeBtnY+28); window._gameoverHomeBtn={x:homeBtnX,y:homeBtnY,w:homeBtnW,h:homeBtnH}; ctx.textAlign='start'; 
    }
    function drawKillFeed() {
        let kfX = W - 180, kfY = 100;
        ctx.textAlign = 'right';
        for (const kf of killFeed) {
            let segments = [];
            if (kf.killerName) {
                if (kf.streakLevel >= 2) {
                    const streakText = STREAK_NAMES[Math.min(kf.streakLevel, STREAK_NAMES.length - 1)] + '! ';
                    segments.push({ text: streakText, color: '#ffaa00' });
                }
                const verb = kf.deathVerb;
                // CORRECT ORDER: victim, verb, killer (for right‑aligned rendering)
                if (kf.isTeamkill) {
                    segments.push({ text: kf.victimName, color: TEAM_COLORS[kf.victimTeam] });
                    segments.push({ text: ` ${verb} `, color: '#aaaaaa' });
                    segments.push({ text: kf.killerName, color: TEAM_COLORS[kf.killerTeam] });
                    segments.push({ text: ' (-1)', color: '#ff4444' });
                } else {
                    segments.push({ text: kf.victimName, color: TEAM_COLORS[kf.victimTeam] });
                    segments.push({ text: ` ${verb} `, color: '#ffffff' });
                    segments.push({ text: kf.killerName, color: TEAM_COLORS[kf.killerTeam] });
                }
            } else {
                segments.push({ text: kf.victimName, color: TEAM_COLORS[kf.victimTeam] });
                segments.push({ text: ` was killed by ${kf.deathType}`, color: '#ffffff' });
            }

            let totalWidth = 0;
            ctx.font = 'bold 14px "Segoe UI", sans-serif';
            for (const seg of segments) totalWidth += ctx.measureText(seg.text).width;
            const barHeight = 20, padX = 6, padY = 2;
            let drawX = kfX - totalWidth - padX;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(drawX, kfY - barHeight/2 - padY, totalWidth + padX*2, barHeight + padY*2);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.strokeRect(drawX, kfY - barHeight/2 - padY, totalWidth + padX*2, barHeight + padY*2);
            drawX = kfX;
            for (const seg of segments) {
                const rgb = hexToRgb(seg.color);
                ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${Math.min(1, kf.timer)})`;
                ctx.fillText(seg.text, drawX, kfY);
                drawX -= ctx.measureText(seg.text).width;
            }
            kfY += 24;
        }
        ctx.textAlign = 'start';
    }

    function render(){
        ctx.clearRect(0,0,W,H);
        if(homeScreen){ drawHomeScreen(); return; }
        ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.fillText('RIOR CTF',20,35);
        if(player){ ctx.fillStyle='#fff'; ctx.font='bold 14px "Segoe UI",sans-serif'; ctx.textAlign='right'; ctx.fillText(`K: ${player.kills}  D: ${player.deaths}`,W-20,30); ctx.textAlign='start'; }
        ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1; const gs=60,sgx=-(camera.x%gs),sgy=-(camera.y%gs);
        for(let gx=sgx;gx<W;gx+=gs){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
        for(let gy=sgy;gy<H;gy+=gs){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
        for(const b of buildings){ if(!b.alive) continue; const sx=b.x-camera.x,sy=b.y-camera.y; if(sx+b.w<-10||sx>W+10||sy+b.h<-10||sy>H+10) continue;
            if(b.isPlaced){ ctx.fillStyle='rgba(74,144,226,0.8)'; ctx.fillRect(sx,sy,b.w,b.h); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeRect(sx,sy,b.w,b.h); }
            else if(b.isEnterable){ ctx.fillStyle='rgba(40,35,30,0.5)'; ctx.fillRect(sx,sy,b.w,b.h); for(const w of b.walls){ const wx=w.x-camera.x,wy=w.y-camera.y; ctx.fillStyle='#6b5e4e'; ctx.fillRect(wx,wy,w.w,w.h); ctx.strokeStyle='#3a3228'; ctx.lineWidth=1.5; ctx.strokeRect(wx,wy,w.w,w.h); } }
            else { ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(sx+4,sy+4,b.w,b.h); const alpha=b.hp/b.maxHp; ctx.fillStyle=`rgb(${Math.floor(parseInt(b.color.slice(1,3),16)*alpha+30*(1-alpha))},${Math.floor(parseInt(b.color.slice(3,5),16)*alpha+20*(1-alpha))},${Math.floor(parseInt(b.color.slice(5,7),16)*alpha+15*(1-alpha))})`; ctx.fillRect(sx,sy,b.w,b.h); if(b.flashAlpha!==0){ ctx.fillStyle=`rgba(255,255,255,${Math.abs(b.flashAlpha)})`; ctx.fillRect(sx,sy,b.w,b.h); } ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2; ctx.strokeRect(sx,sy,b.w,b.h); if(b.hp<b.maxHp*0.6){ ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; for(let c=0;c<Math.floor((1-b.hp/b.maxHp)*5);c++){ ctx.beginPath(); ctx.moveTo(sx+rand(5,b.w-5),sy+rand(5,b.h-5)); ctx.lineTo(sx+rand(-20,20)+rand(5,b.w-5),sy+rand(-20,20)+rand(5,b.h-5)); ctx.stroke(); } } }
        }
        for(const w of walls) w.draw(ctx,camera);
        for(const d of disruptorProjectiles) d.draw(ctx,camera);
        for(const c of cars) if(c.alive){ c.draw(ctx,camera); if(player&&player.alive&&!player.inCar&&dist(player,c)<60&&(c.team===null||c.team===player.team)&&(c.seats[0]==null||c.seats[1]==null)){ ctx.fillStyle='#fff'; ctx.font='bold 13px'; ctx.textAlign='center'; ctx.fillText('Press E to enter',c.x-camera.x,c.y-camera.y-c.h/2-6); ctx.textAlign='start'; } }
        for(const rem of destroyedCarRemains){ const sx=rem.x-camera.x,sy=rem.y-camera.y; ctx.save(); ctx.translate(sx,sy); ctx.rotate(rem.angle); ctx.fillStyle='#333'; ctx.fillRect(-30,-17,60,35); ctx.fillStyle='#aa3333'; ctx.globalAlpha=0.5; ctx.fillRect(-30,-17,60,35); ctx.globalAlpha=1; ctx.restore(); }
        for(const cloud of smokeClouds){ const sx=cloud.x-camera.x,sy=cloud.y-camera.y,a=cloud.life/cloud.maxLife; ctx.fillStyle=cloud.isSmoke?`rgba(180,180,180,${a*0.5})`:`rgba(255,100,20,${a*0.35})`; ctx.beginPath(); ctx.arc(sx,sy,cloud.radius,0,Math.PI*2); ctx.fill(); if(!cloud.isSmoke) for(let i=0;i<8;i++){ const aa=Math.random()*Math.PI*2,rr=rand(10,cloud.radius*0.8); ctx.fillStyle=`rgba(255,${rand(80,200)},0,${a*0.7})`; ctx.beginPath(); ctx.arc(sx+Math.cos(aa)*rr,sy+Math.sin(aa)*rr,rand(3,8),0,Math.PI*2); ctx.fill(); } }
        for(const p of particles){ const sx=p.x-camera.x,sy=p.y-camera.y; ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(sx,sy,p.size,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
        for(const exp of explosives) if(!exp.dead){ const sx=exp.x-camera.x,sy=exp.y-camera.y; ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle=exp.def.name==='Molotov'?'#ff6600':'#555'; ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill(); if(exp.fuse<0.6&&Math.floor(exp.fuse*20)%2===0){ ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(sx,sy,9,0,Math.PI*2); ctx.fill(); } }
        for(const bullet of bullets){ const sx=bullet.x-camera.x,sy=bullet.y-camera.y; if(bullet.trail.length>1){ ctx.strokeStyle=bullet.color+'88'; ctx.lineWidth=bullet.size*0.7; ctx.beginPath(); ctx.moveTo(bullet.trail[0].x-camera.x,bullet.trail[0].y-camera.y); for(const t of bullet.trail) ctx.lineTo(t.x-camera.x,t.y-camera.y); ctx.lineTo(sx,sy); ctx.stroke(); } ctx.fillStyle=bullet.color; ctx.beginPath(); ctx.arc(sx,sy,bullet.size,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,bullet.size*0.4,0,Math.PI*2); ctx.fill(); }
        const sortedPlayers=[...players].filter(p=>p.alive&&!p.inCar).sort((a,b)=>a.y-b.y);
        for(const p of sortedPlayers){ const sx=p.x-camera.x,sy=p.y-camera.y; if(sx<-30||sx>W+30||sy<-30||sy>H+30) continue;
            if(p.isShieldBot){ ctx.fillStyle=TEAM_COLORS[p.team]+'aa'; ctx.beginPath(); ctx.arc(sx,sy,p.radius+4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
            if(p.disruptorImmune>0){ ctx.fillStyle=`rgba(100,180,255,${0.3+Math.sin(performance.now()*10)*0.2})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+6,0,Math.PI*2); ctx.fill(); }
            if(p.spawnImmunity>0){ ctx.fillStyle=`rgba(255,255,255,${0.4+Math.sin(p.spawnImmunity*15)*0.3})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+5,0,Math.PI*2); ctx.fill(); }
            ctx.fillStyle=TEAM_COLORS[p.team]; ctx.beginPath(); ctx.arc(sx,sy,p.radius,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=p.isHuman?'#fff':'rgba(0,0,0,0.6)'; ctx.lineWidth=p.isHuman?3:2; ctx.stroke();
            if(p.isCommander&&p.team===playerTeam){ ctx.strokeStyle='#ffaa00'; ctx.lineWidth=3; ctx.stroke(); }
            if(p.flashAlpha>0){ ctx.fillStyle=`rgba(255,255,255,${p.flashAlpha})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius,0,Math.PI*2); ctx.fill(); }
            if(p.explosiveLocked>0){ const pulse=Math.sin(performance.now()*0.02)*0.3+0.6; ctx.fillStyle=`rgba(255,68,255,${pulse})`; ctx.beginPath(); ctx.arc(sx,sy,p.radius+4,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#ff44ff'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.fillText('🔒',sx,sy-p.radius-20); ctx.textAlign='start'; }
            if (p.hasEnemyFlag) { ctx.fillStyle = TEAM_COLORS[1-p.team]; ctx.fillRect(sx-7, sy-p.radius-14, 14, 9); }
            const barrelLen=p.radius+8; ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(sx+Math.cos(p.angle)*(p.radius-2),sy+Math.sin(p.angle)*(p.radius-2)); ctx.lineTo(sx+Math.cos(p.angle)*barrelLen,sy+Math.sin(p.angle)*barrelLen); ctx.stroke();
            if(p.meleeActive&&p.slots[2]){ const def=p.slots[2]; const range = p.hasEnemyFlag ? def.range*3 : def.range; const arc = p.hasEnemyFlag ? def.arc*1.5 : def.arc; ctx.strokeStyle='rgba(255,255,200,0.7)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(sx,sy,range,p.meleeAngle-arc,p.meleeAngle+arc); ctx.stroke(); ctx.fillStyle='rgba(255,255,200,0.25)'; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.arc(sx,sy,range,p.meleeAngle-arc,p.meleeAngle+arc); ctx.closePath(); ctx.fill(); }
            const hpBarW=p.radius*2,hpBarH=4,hpBarY=sy-p.radius-10; ctx.fillStyle='#333'; ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW,hpBarH);
            ctx.fillStyle=(p.hp/p.maxHp)>0.5?'#4f4':(p.hp/p.maxHp)>0.25?'#ff0':'#f22'; ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW*(p.hp/p.maxHp),hpBarH);
            if(p.isHuman){ ctx.fillStyle='#fff'; ctx.font='bold 11px'; ctx.textAlign='center'; ctx.fillText('YOU',sx,sy-p.radius-14); ctx.textAlign='start'; }
            if(p.isShieldBot){ ctx.fillStyle='#fff'; ctx.font='bold 10px'; ctx.fillText('SHIELD',sx,sy-p.radius-14); }
            if(p.isCommander&&p.team===playerTeam){ ctx.fillStyle='#ffaa00'; ctx.font='bold 10px'; ctx.fillText('CMDR',sx,sy-p.radius-14); }
            if(p.slotReloading[p.currentSlot]){ ctx.fillStyle='#fff'; ctx.font='10px'; ctx.fillText('⟳',sx,sy+p.radius+14); }
            if(p.stunned>0){ ctx.fillStyle='#ff0'; ctx.font='bold 12px'; ctx.fillText('★',sx,sy-p.radius-16); }
        }
        for (const flag of flags) flag.draw(ctx, camera);
        if(player&&player.alive&&!showRespawnScreen&&player.currentSlot<=1&&!player.inCar){ const def=player.slots[player.currentSlot]; if(def&&def.range&&player.slotCooldown[player.currentSlot]<=0.2){ const sx=player.x-camera.x,sy=player.y-camera.y; ctx.beginPath(); ctx.arc(sx,sy,def.range,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke(); } }
        drawKillFeed();
        drawMinimap(); drawScoreboard(); drawHotbar(); drawPlayerHealthBar();
        if(gameOver) drawGameOverScreen();
        if(showRespawnScreen) drawRespawnScreen();
        if(!gameOver&&!showRespawnScreen&&player&&player.alive){ ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(mouseX,mouseY,12,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(mouseX-16,mouseY); ctx.lineTo(mouseX-8,mouseY); ctx.moveTo(mouseX+8,mouseY); ctx.lineTo(mouseX+16,mouseY); ctx.moveTo(mouseX,mouseY-16); ctx.lineTo(mouseX,mouseY-8); ctx.moveTo(mouseX,mouseY+8); ctx.lineTo(mouseX,mouseY+16); ctx.stroke(); }
    }

    function gameLoop(ts){ let dt=(ts-lastTime)/1000; if(dt<=0) dt=0.016; lastTime=ts; update(dt); render(); requestAnimationFrame(gameLoop); }

    canvas.addEventListener('mousemove',e=>{ const rect=canvas.getBoundingClientRect(); mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top; canvas.style.cursor=(homeScreen||showRespawnScreen||gameOver)?'pointer':'crosshair'; });
    canvas.addEventListener('mousedown',e=>{ if(e.button===0){ initAudio(); const rect=canvas.getBoundingClientRect(),cx=e.clientX-rect.left,cy=e.clientY-rect.top; if(homeScreen){ const btn=window._homeStartBtn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h){ 
        homeScreen=false; 
        gameTime = GAME_DURATION; 
        gameOver = false; 
        showRespawnScreen = false; 
        playerRallyPoint=null; 
        initCars(); generateMap(); initPlayers(); 
        flags.forEach(f=>f.returnToBase()); 
        captures=[0,0]; 
        if(player){ camera.x=player.x-W/2; camera.y=player.y-H/2; } 
        lastTime=performance.now(); canvas.style.cursor='crosshair'; 
    } return; } if(gameOver){ const homeBtn=window._gameoverHomeBtn; if(homeBtn&&cx>=homeBtn.x&&cx<=homeBtn.x+homeBtn.w&&cy>=homeBtn.y&&cy<=homeBtn.y+homeBtn.h){ homeScreen=true; gameOver=false; showRespawnScreen=false; canvas.style.cursor='pointer'; return; } restartGame(); return; } if(showRespawnScreen&&player){ const homeBtn=window._deathHomeBtn; if(homeBtn&&cx>=homeBtn.x&&cx<=homeBtn.x+homeBtn.w&&cy>=homeBtn.y&&cy<=homeBtn.y+homeBtn.h){ homeScreen=true; showRespawnScreen=false; gameOver=false; canvas.style.cursor='pointer'; return; } const btn=window._respawnBtn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h){ player.respawn(); showRespawnScreen=false; canvas.style.cursor='crosshair'; } return; } mouseDown=true; mouseClicked=true; } });
    canvas.addEventListener('mouseup',e=>{ if(e.button===0) mouseDown=false; });
    canvas.addEventListener('contextmenu',e=>{ e.preventDefault(); if(homeScreen||gameOver||showRespawnScreen) return; if(playerRallyPoint) playerRallyPoint=null; else playerRallyPoint={x:mouseWorldX,y:mouseWorldY}; });
    canvas.addEventListener('wheel',e=>{ if(homeScreen||gameOver||showRespawnScreen) return; if(!player||!player.alive) return; e.preventDefault(); const delta=e.deltaY>0?1:-1; let newSlot=player.currentSlot+delta; if(newSlot<0) newSlot=4; else if(newSlot>4) newSlot=0; player.switchSlot(newSlot); },{passive:false});
    window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; initAudio(); if(!keyJustPressed[e.key.toLowerCase()]) keyJustPressed[e.key.toLowerCase()]=true; if(e.key==='r'||e.key==='R'){ if(gameOver){ restartGame(); return; } if(player&&player.alive&&player.currentSlot<=1&&!player.slotReloading[player.currentSlot]&&player.slotAmmo[player.currentSlot]<player.slots[player.currentSlot].magSize) player.startReload(player.currentSlot); } if(e.key>='1'&&e.key<='5'){ const slot=parseInt(e.key)-1; if(player&&player.alive&&!showRespawnScreen) player.switchSlot(slot); } });
    window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

    function init(){ lastTime=performance.now(); requestAnimationFrame(gameLoop); }
    init();
})();
</script>
</body>
</html>
